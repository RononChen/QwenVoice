<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vocello iOS — Prototype</title>

<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="app.css">

<style>
  /* Page (outside the phone) */
  body {
    background:
      radial-gradient(60% 40% at 50% 20%, rgba(237, 204, 138, 0.05) 0%, transparent 60%),
      radial-gradient(50% 50% at 80% 70%, rgba(191, 170, 220, 0.06) 0%, transparent 60%),
      #0a0a0d;
    color: var(--fg-2);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
  }
  .vc-stage { position: relative; display: flex; gap: 24px; align-items: center; }
  .vc-frame {
    position: relative;
    width: 402px;
    height: 874px;
    border-radius: 56px;
    background: #000;
    box-shadow:
      0 50px 100px rgba(0, 0, 0, 0.55),
      0 0 0 4px #1a1a1f,
      0 0 0 4.5px rgba(255, 255, 255, 0.05);
    overflow: hidden;
    isolation: isolate;
  }
  /* Dynamic island */
  .vc-island {
    position: absolute;
    top: 11px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 37px; border-radius: 24px;
    background: #000;
    z-index: 200;
    pointer-events: none;
  }
  /* Status bar */
  .vc-statusbar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 54px;
    z-index: 150;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px 0 32px;
    color: #fff;
    pointer-events: none;
  }
  .vc-statusbar .vc-time {
    font-family: -apple-system, 'SF Pro Text', system-ui;
    font-weight: 600;
    font-size: 17px;
    letter-spacing: -0.01em;
    padding-top: 18px;
  }
  .vc-statusbar .vc-icons {
    display: flex; align-items: center; gap: 7px;
    padding-top: 18px;
  }
  /* Home indicator */
  .vc-home-indicator {
    position: absolute;
    bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 139px; height: 5px;
    border-radius: 100px;
    background: rgba(255, 255, 255, 0.7);
    z-index: 200;
    pointer-events: none;
  }
  /* Hint text at edges */
  .vc-side-note {
    position: fixed;
    top: 28px; left: 28px;
    font: 500 12px/16px -apple-system, system-ui;
    color: rgba(255,255,255,0.36);
    letter-spacing: 0.02em;
    z-index: 1;
  }
  .vc-side-note strong {
    color: rgba(255,255,255,0.62);
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="vc-side-note">
  <strong>Vocello iOS · overhaul prototype</strong><br>
  iPhone 16 Pro · use Tweaks to switch theme &amp; density · tap pills, chips, CTA
</div>

<div class="vc-stage">
  <div class="vc-frame">
    <!-- Dynamic island & status bar -->
    <div class="vc-island"></div>
    <div class="vc-statusbar">
      <div class="vc-time">9:41</div>
      <div class="vc-icons">
        <!-- Signal -->
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0"   y="7.5" width="3.2" height="4.5" rx="0.7" fill="currentColor"/>
          <rect x="4.8" y="5"   width="3.2" height="7"   rx="0.7" fill="currentColor"/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill="currentColor"/>
          <rect x="14.4" y="0"  width="3.2" height="12"  rx="0.7" fill="currentColor"/>
        </svg>
        <!-- Wifi -->
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill="currentColor"/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill="currentColor"/>
          <circle cx="8.5" cy="10.5" r="1.5" fill="currentColor"/>
        </svg>
        <!-- Battery -->
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="currentColor" stroke-opacity="0.35" fill="none"/>
          <rect x="2"   y="2"   width="20" height="9"  rx="2" fill="currentColor"/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill="currentColor" fill-opacity="0.4"/>
        </svg>
      </div>
    </div>
    <!-- Home indicator -->
    <div class="vc-home-indicator"></div>

    <!-- App mount -->
    <div id="vc-mount" style="position: absolute; inset: 0;"></div>
  </div>
</div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Data -->
<script src="data.js"></script>

<!-- Tweaks panel scaffold -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- App modules (ordered so window. assignments are ready before app.jsx) -->
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="sheets.jsx"></script>
<script type="text/babel" src="player.jsx"></script>
<script type="text/babel" src="studio.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
