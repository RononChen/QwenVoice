<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Vocello — macOS app UI kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body { margin: 0; height: 100%; background: #14161B; }
    body {
      font-family: var(--font-text);
      color: var(--fg-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow: hidden;
      background:
        radial-gradient(80% 60% at 20% 0%, rgba(237,204,138,0.04), transparent 60%),
        radial-gradient(80% 60% at 80% 100%, rgba(191,170,219,0.04), transparent 60%),
        #14161B;
    }
    #root { height: 100vh; display: grid; place-items: center; padding: 0; }

    /* macOS window chrome */
    .vc-window {
      width: 960px;
      height: 720px;
      max-width: calc(100vw);
      max-height: calc(100vh);
      background: var(--bg-canvas);
      border-radius: 12px;
      overflow: hidden;
      box-shadow:
        0 30px 80px rgba(0, 0, 0, 0.55),
        0 6px 18px rgba(0, 0, 0, 0.35),
        inset 0 0 0 1px rgba(255, 255, 255, 0.06);
      display: grid;
      grid-template-rows: 28px 1fr;
    }
    .vc-titlebar {
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.00));
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; padding: 0 12px;
      -webkit-app-region: drag;
    }
    .vc-traffic { display: flex; gap: 8px; }
    .vc-traffic span {
      width: 12px; height: 12px; border-radius: 50%;
      display: inline-block;
      box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.20);
    }
    .vc-traffic .red    { background: #FF5F57; }
    .vc-traffic .yellow { background: #FEBC2E; }
    .vc-traffic .green  { background: #28C840; }

    .vc-shell { display: flex; min-height: 0; }

    /* Reduce-motion safety */
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }

    /* native select dark caret */
    select { color-scheme: dark; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="Card.jsx"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="GenerationScreens.jsx"></script>
  <script type="text/babel" src="LibraryScreens.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useMemo } = React;

const SAMPLE_HISTORY = [
  { mode: "custom",  voice: "Aiden",   delivery: "Calm",    duration: "0:12", when: "10:42 AM", text: "Welcome to the studio. Take a moment, then write something true." },
  { mode: "design",  voice: "Designed", delivery: "Warm",   duration: "0:08", when: "10:39 AM", text: "A warm, deep narrator with a subtle British accent introducing the chapter." },
  { mode: "clone",   voice: "UITestRef", delivery: "Calm",  duration: "0:15", when: "10:33 AM", text: "And then she said: 'we already had what we were looking for.'" },
  { mode: "custom",  voice: "Iris",     delivery: "Excited", duration: "0:06", when: "Yesterday", text: "Five, four, three, two, one — go!" },
  { mode: "design",  voice: "Designed", delivery: "Whisper", duration: "0:09", when: "Yesterday", text: "Soft, close-mic, just above a whisper." },
];

const SAMPLE_VOICES = [
  { initials: "UR", name: "UITestRef",     kind: "From Voice Design", duration: "0:15" },
  { initials: "NW", name: "Narrator (warm)", kind: "Imported reference", duration: "0:12" },
  { initials: "AB", name: "Anna Brooks",   kind: "Imported reference", duration: "0:18" },
  { initials: "JS", name: "Jamie S.",      kind: "Imported reference", duration: "0:10" },
];

function App() {
  const [tab, setTab] = useState("custom");
  const [model, setModel] = useState("Quality");
  const [isGenerating, setIsGenerating] = useState(false);
  const [player, setPlayer] = useState(null);

  const [customDraft, setCustomDraft] = useState({
    speaker: "aiden", delivery: "calm", intensity: "normal", customTone: "", text: "Take a breath. We start with something small, then build from there.",
  });
  const [designDraft, setDesignDraft] = useState({
    brief: "A composed documentary narrator with a low, warm voice and deliberate pacing.",
    delivery: "neutral", intensity: "normal",
    text: "",
  });
  const [cloneDraft, setCloneDraft] = useState({
    source: "saved", savedVoice: "", refFile: "", transcript: "", text: "",
  });

  function fakeGenerate(mode) {
    setIsGenerating(true);
    setTimeout(() => {
      setIsGenerating(false);
      const titles = {
        custom: "Custom Voice take",
        design: "Voice Design take",
        clone:  "Voice Cloning take",
      };
      const sub = {
        custom: "Aiden · Calm",
        design: "Designed · Warm",
        clone:  "UITestRef · Reference",
      };
      setPlayer({ track: { title: titles[mode], subtitle: sub[mode] } });
    }, 1200);
  }

  let screen;
  if (tab === "custom") {
    screen = <CustomVoiceScreen
      draft={customDraft} setDraft={setCustomDraft}
      model={model} setModel={setModel}
      isGenerating={isGenerating}
      onGenerate={() => fakeGenerate("custom")}
    />;
  } else if (tab === "design") {
    screen = <VoiceDesignScreen
      draft={designDraft} setDraft={setDesignDraft}
      model={model} setModel={setModel}
      isGenerating={isGenerating}
      onGenerate={() => fakeGenerate("design")}
    />;
  } else if (tab === "clone") {
    screen = <VoiceCloningScreen
      draft={cloneDraft} setDraft={setCloneDraft}
      model={model} setModel={setModel}
      isGenerating={isGenerating}
      onGenerate={() => fakeGenerate("clone")}
    />;
  } else if (tab === "history") {
    screen = <HistoryScreen items={SAMPLE_HISTORY} />;
  } else if (tab === "voices") {
    screen = <SavedVoicesScreen voices={SAMPLE_VOICES} />;
  } else if (tab === "settings") {
    screen = <SettingsScreen />;
  }

  return (
    <div className="vc-window" data-screen-label={`Vocello macOS · ${tab}`}>
      <div className="vc-titlebar">
        <div className="vc-traffic">
          <span className="red"></span>
          <span className="yellow"></span>
          <span className="green"></span>
        </div>
      </div>
      <div className="vc-shell">
        <Sidebar selected={tab} onSelect={setTab} player={player} />
        {screen}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
