<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 16px; padding: 26px 30px; min-height: 320px; }
  .specimen { background: var(--bg-card); border: 1px solid var(--stroke-card); border-radius: 16px; padding: 18px 20px; position: relative; }
  .specimen::before {
    content: ""; position: absolute; inset: 0; border-radius: inherit; pointer-events: none;
    background: linear-gradient(180deg, rgba(255,255,255,0.05), transparent 40%);
  }
  .h-screen { font-size: 22px; font-weight: 600; margin: 0 0 4px; }
  .h-card { font-size: 17px; font-weight: 600; margin: 0 0 4px; display: flex; align-items: center; gap: 8px; }
  .h-card .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .h-card .icon { width: 14px; height: 14px; opacity: 0.85; }
  .h-card.gold { color: var(--fg-primary); }
  .lbl { font-size: 13px; font-weight: 600; color: var(--fg-primary); }
  .det { font-size: 12px; color: var(--fg-secondary); line-height: 1.5; margin: 4px 0 0; }
  .eyebrow { font-size: 11px; font-weight: 600; color: var(--fg-secondary); letter-spacing: 0.04em; }
  .body { font-size: 15px; color: var(--fg-primary); line-height: 1.5; }
  .trailing { float: right; font-size: 12px; color: var(--fg-secondary); font-weight: 500; }
  .ready { color: #5DD49B; }
</style>
</head><body>
<div class="card">
  <div class="specimen">
    <span class="trailing ready">Ready</span>
    <div class="h-card gold">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#EDCC8A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"></line><line x1="4" y1="12" x2="20" y2="12"></line><line x1="4" y1="18" x2="14" y2="18"></line></svg>
      Script
    </div>
    <p class="det" style="margin-bottom:10px;">Pick a built-in speaker, then shape the delivery before you generate.</p>
    <div class="lbl">Speaker</div>
    <div class="det">Choose the built-in speaker that should deliver this line.</div>
  </div>

  <div class="specimen" style="padding:14px 18px;">
    <div class="eyebrow">Generate</div>
    <div style="height:6px;"></div>
    <div class="body">Speaker and delivery are set. <span style="color: var(--fg-secondary);">Add a line to generate.</span></div>
  </div>
</div>
</body></html>
