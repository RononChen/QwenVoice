<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 22px; padding: 28px 30px; min-height: 320px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .label-h { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-tertiary); width: 92px; flex: none; }

  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 13px; font-weight: 600;
    background: var(--bg-inline);
    border: 1px solid rgba(255,255,255,0.10);
    color: var(--fg-primary);
    cursor: pointer;
  }
  .chip[data-selected="true"] {
    background: rgba(237,204,138,0.20);
    border-color: rgba(237,204,138,0.32);
    color: var(--accent);
  }
  .chip.lavender[data-selected="true"] { background: rgba(191,170,219,0.20); border-color: rgba(191,170,219,0.32); color: #BFAADB; }
  .chip.terra[data-selected="true"]    { background: rgba(219,168,135,0.20); border-color: rgba(219,168,135,0.32); color: #DBA887; }
  .chip .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  /* Speed / Quality segmented control */
  .seg {
    display: inline-flex;
    padding: 3px;
    background: var(--bg-inline);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 8px;
  }
  .seg button {
    background: transparent; border: 0; border-radius: 6px;
    padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--fg-primary);
    cursor: pointer;
  }
  .seg button[data-on="true"] {
    background: rgba(237,204,138,0.22);
    color: var(--accent);
    box-shadow: inset 0 0 0 1px rgba(237,204,138,0.32);
  }
</style>
</head><body>
<div class="card">
  <div class="row">
    <div class="label-h">Delivery</div>
    <span class="chip"><span class="dot"></span>Neutral</span>
    <span class="chip" data-selected="true"><span class="dot"></span>Calm</span>
    <span class="chip"><span class="dot"></span>Happy</span>
    <span class="chip"><span class="dot"></span>Excited</span>
    <span class="chip"><span class="dot"></span>Whisper</span>
    <span class="chip"><span class="dot"></span>Dramatic</span>
  </div>
  <div class="row">
    <div class="label-h">Voice Design</div>
    <span class="chip lavender"><span class="dot"></span>Neutral</span>
    <span class="chip lavender" data-selected="true"><span class="dot"></span>Calm</span>
    <span class="chip lavender"><span class="dot"></span>Sad</span>
  </div>
  <div class="row">
    <div class="label-h">Voice Cloning</div>
    <span class="chip terra"><span class="dot"></span>Neutral</span>
    <span class="chip terra" data-selected="true"><span class="dot"></span>Calm</span>
    <span class="chip terra"><span class="dot"></span>Excited</span>
  </div>
  <div class="row">
    <div class="label-h">Model</div>
    <div class="seg">
      <button>Speed</button>
      <button data-on="true">Quality</button>
    </div>
    <span class="muted" style="font-size: 12px;">The segmented Speed / Quality toggle is the same chip recipe in a track.</span>
  </div>
</div>
</body></html>
