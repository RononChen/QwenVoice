<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 18px; padding: 0; }
  .panel {
    flex: 1; display: grid; place-items: center;
    min-height: 180px;
  }
  .panel--dark { background: linear-gradient(180deg, #0F1014, #1A1C22); }
  .panel--light { background: linear-gradient(180deg, #FBFCFE, #ECEFF5); }
  .panel--dark img, .panel--light img { width: 280px; height: auto; }
  .panel--light img { filter: brightness(0) saturate(100%); }
  /* The launch logo is light cream; on light background, render a darker version */
  .badge { position: absolute; bottom: 12px; left: 16px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); letter-spacing: 0.04em; }
  .panel { position: relative; }
</style>
</head><body>
<div class="card">
  <div class="panel panel--dark">
    <img src="../assets/vocello-launch-logo@3x.png" alt="Vocello launch logo on dark">
    <span class="badge">Launch · Splash · Marketing</span>
  </div>
  <div class="panel panel--light">
    <img src="../assets/vocello-launch-logo@3x.png" alt="Vocello launch logo, inverted for light" style="filter:none;">
    <span class="badge" style="color:#6F7280;">For light surfaces, switch to the dark V mark + serif "Vocello" in #1B1D24</span>
  </div>
</div>
</body></html>
