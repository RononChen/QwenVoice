<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 16px; padding: 28px 30px; min-height: 320px; }
  .group { display: flex; flex-direction: column; gap: 6px; }
  .lbl { font-size: 13px; font-weight: 600; color: var(--fg-primary); }
  .help { font-size: 11px; color: var(--fg-secondary); }
  .field {
    height: 36px; display: flex; align-items: center;
    padding: 0 12px;
    background: var(--bg-field);
    border: 0.5px solid rgba(255,255,255,0.10);
    border-radius: 10px;
    font-size: 13px; color: var(--fg-primary);
  }
  .field--focus { border-color: rgba(237,204,138,0.40); box-shadow: 0 0 0 3px rgba(237,204,138,0.10); }
  .field--multiline { height: auto; padding: 12px; min-height: 72px; align-items: flex-start; line-height: 1.5; }
  .field .placeholder { color: var(--fg-tertiary); }
  .field .chev { margin-left: auto; color: var(--fg-secondary); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
</style>
</head><body>
<div class="card">
  <div class="group">
    <span class="lbl">Voice brief</span>
    <div class="field">A warm, deep narrator with a subtle British accent.<span class="chev"></span></div>
    <span class="help">Describe timbre, accent, or delivery style in one tight sentence.</span>
  </div>
  <div class="row">
    <div class="group">
      <span class="lbl">Speaker</span>
      <div class="field">Aiden — English native
        <svg class="chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 9 12 4 17 9"/><polyline points="7 15 12 20 17 15"/></svg>
      </div>
    </div>
    <div class="group">
      <span class="lbl">Delivery</span>
      <div class="field">Neutral
        <svg class="chev" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="7 9 12 4 17 9"/><polyline points="7 15 12 20 17 15"/></svg>
      </div>
    </div>
  </div>
  <div class="group">
    <span class="lbl">Custom tone <span style="font-weight:500; color: var(--fg-tertiary);">(focused)</span></span>
    <div class="field field--focus"><span class="placeholder">Describe the delivery in your own words</span></div>
  </div>
  <div class="group">
    <span class="lbl">Script</span>
    <div class="field field--multiline"><span class="placeholder">Type or paste your script</span></div>
  </div>
</div>
</body></html>
