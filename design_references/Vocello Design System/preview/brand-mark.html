<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { display: flex; align-items: center; gap: 28px; min-height: 200px; }
  .mark-bg-dark, .mark-bg-light {
    width: 200px; height: 200px;
    border-radius: 24px;
    display: grid; place-items: center;
    border: 1px solid var(--stroke-card);
  }
  .mark-bg-dark { background: linear-gradient(180deg, #16181E, #0D0E12); }
  .mark-bg-light { background: linear-gradient(180deg, #FBFCFE, #ECEFF5); border: 1px solid rgba(123,138,165,0.30); }
  .mark-bg-dark img, .mark-bg-light img { width: 96px; height: 96px; object-fit: contain; }
  .lockup { display: flex; align-items: baseline; gap: 12px; flex: 1; }
  .lockup img { height: 36px; align-self: center; }
  .lockup .name {
    font-family: var(--font-display); font-weight: 600;
    font-size: 28px; letter-spacing: -0.01em;
    color: var(--fg-primary);
  }
  .lockup .eyebrow {
    font-size: 12px; font-weight: 600; color: var(--fg-secondary);
    letter-spacing: 0.04em;
  }
  .stack { display: flex; flex-direction: column; gap: 22px; flex: 1; }
  .stack .label { font-size: 11px; color: var(--fg-tertiary); text-transform: uppercase; letter-spacing: 0.10em; margin-bottom: 6px; }
</style>
</head><body>
<div class="card">
  <div style="display:flex; flex-direction:column; gap:18px; align-items:center;">
    <div class="mark-bg-dark"><img src="../assets/vocello-header-mark@3x.png" alt="Vocello V mark on dark"></div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary);">on dark</div>
  </div>
  <div class="stack">
    <div>
      <div class="label">Sidebar lockup</div>
      <div class="lockup">
        <img src="../assets/vocello-header-mark@3x.png" alt="">
        <span class="name">Vocello</span>
        <span class="eyebrow">AI·TTS</span>
      </div>
    </div>
    <div class="hairline"></div>
    <div>
      <div class="label">Minimum size</div>
      <div class="lockup" style="gap:6px;">
        <img src="../assets/vocello-header-mark@3x.png" alt="" style="height:18px;">
        <span class="name" style="font-size:14px;">Vocello</span>
        <span class="eyebrow" style="font-size:10px;">AI·TTS</span>
      </div>
    </div>
  </div>
</div>
</body></html>
