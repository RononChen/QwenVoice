<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { display: flex; flex-direction: column; gap: 16px; min-height: 240px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; }
  .ready    { background: rgba(76,195,138,0.16); color: #5DD49B; border: 1px solid rgba(76,195,138,0.30); }
  .ready .dot   { background: #5DD49B; }
  .warn     { background: rgba(232,148,58,0.16); color: #F0A55D; border: 1px solid rgba(232,148,58,0.30); }
  .warn .dot    { background: #F0A55D; }
  .danger   { background: rgba(229,72,59,0.16); color: #F26A60; border: 1px solid rgba(229,72,59,0.30); }
  .danger .dot  { background: #F26A60; }
  .info     { background: rgba(237,204,138,0.16); color: #EDCC8A; border: 1px solid rgba(237,204,138,0.30); }
  .info .dot    { background: #EDCC8A; }
  .neutral  { background: rgba(255,255,255,0.05); color: var(--fg-secondary); border: 1px solid rgba(255,255,255,0.10); }
  .swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .sw { background: var(--bg-inline); border: 1px solid var(--stroke-inline); border-radius: 12px; padding: 12px; }
  .sw .name { font-size: 11px; font-weight: 600; }
  .sw .desc { font-size: 10px; color: var(--fg-secondary); line-height: 1.4; margin-top: 2px; }
  .sw .hex { font-family: var(--font-mono); font-size: 9px; color: var(--fg-tertiary); margin-top: 6px; }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-tertiary); font-weight: 600; }
</style>
</head><body>
<div class="card">
  <div>
    <div class="label" style="margin-bottom:8px;">In use — Settings model rows</div>
    <div class="row">
      <span class="pill ready"><span class="dot"></span>Ready</span>
      <span class="pill info">Recommended</span>
      <span class="pill warn">Heavy</span>
      <span class="pill neutral">Preparing</span>
      <span class="pill danger"><span class="dot"></span>Engine needs attention</span>
    </div>
  </div>
  <div>
    <div class="label" style="margin-bottom:8px;">Tokens</div>
    <div class="swatch-grid">
      <div class="sw" style="border-color: rgba(76,195,138,0.30);"><div class="name" style="color:#5DD49B;">status-ready</div><div class="desc">Models loaded · engine green</div><div class="hex">#4CC38A</div></div>
      <div class="sw" style="border-color: rgba(232,148,58,0.30);"><div class="name" style="color:#F0A55D;">status-warn</div><div class="desc">Heavy package · large download</div><div class="hex">#E8943A</div></div>
      <div class="sw" style="border-color: rgba(229,72,59,0.30);"><div class="name" style="color:#F26A60;">status-danger</div><div class="desc">Engine needs attention · errors</div><div class="hex">#E5483B</div></div>
      <div class="sw" style="border-color: rgba(237,204,138,0.30);"><div class="name" style="color:#EDCC8A;">status-info</div><div class="desc">Resolves to gold (= accent)</div><div class="hex">#EDCC8A</div></div>
    </div>
  </div>
</div>
</body></html>
