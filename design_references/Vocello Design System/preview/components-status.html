<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_base.css">
<style>
  .card { padding: 28px 30px; min-height: 260px; display: flex; flex-direction: column; gap: 18px; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
    background: var(--bg-inline);
    border: 0.5px solid rgba(255,255,255,0.18);
  }
  .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
  .b-ready    { background: rgba(76,195,138,0.16); color: #5DD49B; border-color: rgba(76,195,138,0.30); }
  .b-ready .dot   { background: #5DD49B; }
  .b-warn     { background: rgba(232,148,58,0.16); color: #F0A55D; border-color: rgba(232,148,58,0.30); }
  .b-info     { background: rgba(237,204,138,0.16); color: #EDCC8A; border-color: rgba(237,204,138,0.30); }
  .b-mode-g   { background: rgba(237,204,138,0.16); color: #EDCC8A; border-color: rgba(237,204,138,0.30); }
  .b-mode-l   { background: rgba(191,170,219,0.16); color: #BFAADB; border-color: rgba(191,170,219,0.30); }
  .b-mode-t   { background: rgba(219,168,135,0.16); color: #DBA887; border-color: rgba(219,168,135,0.30); }

  .engine {
    display: inline-flex; align-items: baseline; gap: 8px;
    font-size: 11px; color: var(--fg-secondary);
  }
  .engine b { color: var(--fg-primary); font-weight: 600; font-size: 12px; }
  .engine .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #5DD49B; box-shadow: 0 0 0 3px rgba(93,212,155,0.16); transform: translateY(-1px); }

  .readiness {
    display: flex; flex-direction: column; gap: 4px;
    padding: 10px 14px;
    background: var(--bg-inline);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 12px;
  }
  .readiness .row { gap: 8px; }
  .readiness .title { font-size: 13px; font-weight: 600; }
  .readiness .det { font-size: 12px; color: var(--fg-secondary); line-height: 1.45; }

  .label-h { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-tertiary); margin-bottom: 2px; }
</style>
</head><body>
<div class="card">
  <div>
    <div class="label-h">Status badges</div>
    <div class="row">
      <span class="badge b-ready"><span class="dot"></span>Ready</span>
      <span class="badge b-info">Recommended</span>
      <span class="badge b-warn">Heavy</span>
      <span class="badge">Preparing</span>
      <span class="badge">Generating</span>
    </div>
  </div>
  <div>
    <div class="label-h">Mode badges (History row capsules)</div>
    <div class="row">
      <span class="badge b-mode-g">Custom Voice</span>
      <span class="badge b-mode-l">Voice Design</span>
      <span class="badge b-mode-t">Voice Cloning</span>
    </div>
  </div>
  <div>
    <div class="label-h">Sidebar footer · engine status</div>
    <div class="engine">
      <span class="dot"></span>
      <span style="display:inline-flex; flex-direction:column; align-items:flex-start;">
        <b style="color: var(--fg-secondary); font-weight:600; letter-spacing: 0.04em;">Engine</b>
        <span style="color: var(--fg-primary); font-weight: 600; font-size: 13px;">Ready</span>
      </span>
    </div>
  </div>
  <div>
    <div class="label-h">Readiness note</div>
    <div class="readiness">
      <div class="title">Add a script</div>
      <div class="det">Speaker and delivery are set. Add a line to generate.</div>
    </div>
  </div>
</div>
</body></html>
