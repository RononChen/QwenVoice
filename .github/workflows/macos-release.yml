name: Vocello macOS Release

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or commit to build
        required: false
        default: main
        type: string
      release_tag:
        description: Optional GitHub release tag to publish
        required: false
        default: ""
        type: string
      release_notes_path:
        description: Optional checked-in release notes file when publishing
        required: false
        default: ""
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: vocello-macos-release-${{ inputs.release_tag || inputs.git_ref }}
  cancel-in-progress: false

jobs:
  build-notarize-release:
    runs-on: macos-26
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Select Xcode
        run: |
          SELECTED_XCODE="$(python3 -c "from pathlib import Path; apps=sorted(Path('/Applications').glob('Xcode*.app')); preferred=Path('/Applications/Xcode.app'); stable=[app for app in apps if 'beta' not in app.name.lower()]; print(preferred if preferred.exists() else (stable[-1] if stable else (apps[-1] if apps else preferred)))")"
          sudo xcode-select -s "$SELECTED_XCODE"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            build/foundation/source-packages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Assert release signing secrets
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEV_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          APPLE_DEV_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          MISSING=0
          for secret_name in \
            APPLE_TEAM_ID \
            APPLE_DEV_ID_APP_P12_BASE64 \
            APPLE_DEV_ID_APP_P12_PASSWORD \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_PRIVATE_KEY_P8; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is required for signed/notarized macOS releases"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Developer ID signing materials
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_DEV_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          APPLE_DEV_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_PRIVATE_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          SIGNING_KEYCHAIN_PATH="$RUNNER_TEMP/vocello-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/vocello-dev-id-app.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(python3 -c 'import secrets; print(secrets.token_urlsafe(24))')"

          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "::add-mask::$APPLE_DEV_ID_APP_P12_PASSWORD"

          APPLE_DEV_ID_APP_P12_BASE64="$APPLE_DEV_ID_APP_P12_BASE64" \
          CERT_PATH="$CERT_PATH" \
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_DEV_ID_APP_P12_BASE64"]))'

          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY_P8" > "$NOTARY_KEY_PATH"
          chmod 600 "$CERT_PATH" "$NOTARY_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$SIGNING_KEYCHAIN_PATH" \
            -P "$APPLE_DEV_ID_APP_P12_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN_PATH"
          security default-keychain -d user -s "$SIGNING_KEYCHAIN_PATH"

          CODESIGN_IDENTITY="$(security find-identity -v -p codesigning "$SIGNING_KEYCHAIN_PATH" | awk -F'\"' '/Developer ID Application:/ { print $2; exit }')"
          if [ -z "$CODESIGN_IDENTITY" ]; then
            echo "::error::Could not find a Developer ID Application identity in the imported certificate"
            exit 1
          fi

          {
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            echo "APPLE_CODESIGN_IDENTITY=$CODESIGN_IDENTITY"
            echo "QWENVOICE_SIGNING_KEYCHAIN=$SIGNING_KEYCHAIN_PATH"
            echo "APPLE_DEV_ID_APP_P12_PATH=$CERT_PATH"
            echo "APPLE_NOTARY_KEY_ID=$APPLE_NOTARY_KEY_ID"
            echo "APPLE_NOTARY_ISSUER_ID=$APPLE_NOTARY_ISSUER_ID"
            echo "APPLE_NOTARY_API_KEY_PATH=$NOTARY_KEY_PATH"
          } >> "$GITHUB_ENV"

      - name: Build signed release DMG
        env:
          APPLE_TEAM_ID: ${{ env.APPLE_TEAM_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ env.APPLE_CODESIGN_IDENTITY }}
          QWENVOICE_SIGNING_KEYCHAIN: ${{ env.QWENVOICE_SIGNING_KEYCHAIN }}
        run: |
          ./scripts/release.sh \
            --output-name Vocello-macos26 \
            --signing-mode developer-id \
            --signing-identity "$APPLE_CODESIGN_IDENTITY" \
            --codesign-keychain "$QWENVOICE_SIGNING_KEYCHAIN"

      - name: Verify signed release bundle before notarization
        run: |
          APP_PATH="$(find build -maxdepth 1 -name '*.app' -type d | head -n1)"
          test -n "$APP_PATH"
          QWENVOICE_EXPECT_SIGNED_RELEASE=1 ./scripts/verify_release_bundle.sh "$APP_PATH"
          QWENVOICE_EXPECT_SIGNED_RELEASE=1 ./scripts/verify_packaged_dmg.sh "build/Vocello-macos26.dmg" "build/release-metadata.txt"

      - name: Notarize and staple DMG
        env:
          APPLE_NOTARY_API_KEY_PATH: ${{ env.APPLE_NOTARY_API_KEY_PATH }}
          APPLE_NOTARY_KEY_ID: ${{ env.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ env.APPLE_NOTARY_ISSUER_ID }}
        run: |
          SUBMIT_ARGS=(
            --key "$APPLE_NOTARY_API_KEY_PATH"
            --key-id "$APPLE_NOTARY_KEY_ID"
            --wait
            --timeout 20m
            --output-format json
          )
          if [ -n "$APPLE_NOTARY_ISSUER_ID" ]; then
            SUBMIT_ARGS+=(--issuer "$APPLE_NOTARY_ISSUER_ID")
          fi

          xcrun notarytool submit "build/Vocello-macos26.dmg" "${SUBMIT_ARGS[@]}" > build/notary-submit.json
          STATUS="$(python3 -c 'import json, pathlib; print(json.loads(pathlib.Path("build/notary-submit.json").read_text())["status"])')"
          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$STATUS'"
            cat build/notary-submit.json
            exit 1
          fi

          xcrun stapler staple "build/Vocello-macos26.dmg"
          xcrun stapler validate "build/Vocello-macos26.dmg"
          spctl -a -vvv --type open --context context:primary-signature "build/Vocello-macos26.dmg"
          QWENVOICE_EXPECT_SIGNED_RELEASE=1 \
          QWENVOICE_EXPECT_NOTARIZED_DMG=1 \
          ./scripts/verify_packaged_dmg.sh "build/Vocello-macos26.dmg" "build/release-metadata.txt"
          shasum -a 256 "build/Vocello-macos26.dmg" | awk '{print $1 "  Vocello-macos26.dmg"}' > "build/Vocello-macos26.dmg.sha256"

      - name: Upload notarized artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vocello-macos26-release
          if-no-files-found: error
          path: |
            build/Vocello-macos26.dmg
            build/Vocello-macos26.dmg.sha256
            build/release-metadata.txt
            build/notary-submit.json
            build/foundation/macos-release-build.xcresult

      - name: Publish macOS release summary
        if: always()
        run: |
          {
            echo "## Vocello macOS Release"
            echo
            echo "- This workflow is the signed/public release proof path for the current macOS-first release track."
            echo "- The shipped public artifact for this milestone is the notarized Vocello-macos26.dmg."
            echo "- iPhone TestFlight remains maintained separately and is not required for current release signoff."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub release assets
        if: ${{ inputs.release_tag != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.release_tag }}"
          NOTES_PATH="${{ inputs.release_notes_path }}"
          VERSION="${TAG#v}"
          TITLE="Vocello $VERSION"
          RELEASE_FLAGS=()
          EDIT_FLAGS=()
          if [[ "$VERSION" =~ ^(.+)-beta\.([0-9]+)$ ]]; then
            TITLE="Vocello ${BASH_REMATCH[1]} beta ${BASH_REMATCH[2]}"
            RELEASE_FLAGS+=(--prerelease)
            EDIT_FLAGS+=(--prerelease)
          elif [[ "$VERSION" =~ ^(.+)-rc\.([0-9]+)$ ]]; then
            TITLE="Vocello ${BASH_REMATCH[1]} RC ${BASH_REMATCH[2]}"
            RELEASE_FLAGS+=(--prerelease)
            EDIT_FLAGS+=(--prerelease)
          fi
          if [ -n "$NOTES_PATH" ] && [ ! -f "$NOTES_PATH" ]; then
            echo "::error::Release notes file not found: $NOTES_PATH"
            exit 1
          fi
          if gh release view "$TAG" -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [ -n "$NOTES_PATH" ]; then
              gh release edit "$TAG" -R "$GITHUB_REPOSITORY" --title "$TITLE" --notes-file "$NOTES_PATH" "${EDIT_FLAGS[@]}"
            else
              gh release edit "$TAG" -R "$GITHUB_REPOSITORY" --title "$TITLE" "${EDIT_FLAGS[@]}"
            fi
          else
            if [ -n "$NOTES_PATH" ]; then
              gh release create "$TAG" -R "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TITLE" --notes-file "$NOTES_PATH" "${RELEASE_FLAGS[@]}"
            else
              gh release create "$TAG" -R "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --title "$TITLE" --generate-notes "${RELEASE_FLAGS[@]}"
            fi
          fi

          gh release upload "$TAG" -R "$GITHUB_REPOSITORY" \
            "build/Vocello-macos26.dmg#Vocello-macos26.dmg" \
            "build/Vocello-macos26.dmg.sha256#Vocello-macos26.dmg.sha256" \
            "build/release-metadata.txt#Vocello-macos26.metadata.txt" \
            --clobber

      - name: Clean up signing credentials
        if: always()
        run: |
          if [ -n "${QWENVOICE_SIGNING_KEYCHAIN:-}" ] && [ -f "$QWENVOICE_SIGNING_KEYCHAIN" ]; then
            security delete-keychain "$QWENVOICE_SIGNING_KEYCHAIN" >/dev/null 2>&1 || true
          fi
          rm -f "${APPLE_DEV_ID_APP_P12_PATH:-}" "${APPLE_NOTARY_API_KEY_PATH:-}"
