name: Vocello iOS TestFlight

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: Branch, tag, or commit to build
        required: false
        default: main
        type: string
      upload_to_testflight:
        description: Upload directly to App Store Connect
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: vocello-ios-testflight-${{ inputs.git_ref }}
  cancel-in-progress: false

jobs:
  build-ios-testflight:
    runs-on: macos-26
    timeout-minutes: 180
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_ref }}
          fetch-depth: 0

      - name: Select Xcode
        run: |
          SELECTED_XCODE="$(python3 -c "from pathlib import Path; apps=sorted(Path('/Applications').glob('Xcode*.app')); preferred=Path('/Applications/Xcode.app'); stable=[app for app in apps if 'beta' not in app.name.lower()]; print(preferred if preferred.exists() else (stable[-1] if stable else (apps[-1] if apps else preferred)))")"
          sudo xcode-select -s "$SELECTED_XCODE"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            build/foundation/source-packages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh

      - name: Assert iOS signing secrets
        env:
          APPLE_IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.APPLE_IOS_DISTRIBUTION_P12_BASE64 }}
          APPLE_IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_IOS_DISTRIBUTION_P12_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_P8 }}
        run: |
          MISSING=0
          for secret_name in \
            APPLE_IOS_DISTRIBUTION_P12_BASE64 \
            APPLE_IOS_DISTRIBUTION_P12_PASSWORD \
            APP_STORE_CONNECT_API_KEY_ID \
            APP_STORE_CONNECT_API_PRIVATE_KEY_P8; do
            if [ -z "${!secret_name}" ]; then
              echo "::error::$secret_name is required for iOS TestFlight packaging"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare iOS signing materials
        env:
          APPLE_IOS_DISTRIBUTION_P12_BASE64: ${{ secrets.APPLE_IOS_DISTRIBUTION_P12_BASE64 }}
          APPLE_IOS_DISTRIBUTION_P12_PASSWORD: ${{ secrets.APPLE_IOS_DISTRIBUTION_P12_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_PRIVATE_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_PRIVATE_KEY_P8 }}
        run: |
          SIGNING_KEYCHAIN_PATH="$RUNNER_TEMP/vocello-ios-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/vocello-ios-distribution.p12"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          KEYCHAIN_PASSWORD="$(python3 -c 'import secrets; print(secrets.token_urlsafe(24))')"

          echo "::add-mask::$KEYCHAIN_PASSWORD"
          echo "::add-mask::$APPLE_IOS_DISTRIBUTION_P12_PASSWORD"

          APPLE_IOS_DISTRIBUTION_P12_BASE64="$APPLE_IOS_DISTRIBUTION_P12_BASE64" \
          CERT_PATH="$CERT_PATH" \
          python3 -c 'import base64, os, pathlib; pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_IOS_DISTRIBUTION_P12_BASE64"]))'

          printf '%s' "$APP_STORE_CONNECT_API_PRIVATE_KEY_P8" > "$API_KEY_PATH"
          chmod 600 "$CERT_PATH" "$API_KEY_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$SIGNING_KEYCHAIN_PATH" \
            -P "$APPLE_IOS_DISTRIBUTION_P12_PASSWORD" \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN_PATH"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN_PATH"
          security default-keychain -d user -s "$SIGNING_KEYCHAIN_PATH"

          {
            echo "APP_STORE_CONNECT_API_KEY_PATH=$API_KEY_PATH"
            echo "QWENVOICE_SIGNING_KEYCHAIN=$SIGNING_KEYCHAIN_PATH"
          } >> "$GITHUB_ENV"

      - name: Build TestFlight archive and export
        env:
          APP_STORE_CONNECT_API_KEY_PATH: ${{ env.APP_STORE_CONNECT_API_KEY_PATH }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          QVOICE_IOS_OWNED_DEVICE_VALIDATION_TARGET: iPhone 17 Pro
          QVOICE_IOS_OWNED_DEVICE_VALIDATION_STATUS: unrecorded
          QVOICE_IOS_MINIMUM_DEVICE_PROOF_STATUS: pending
        run: |
          if [ "${{ inputs.upload_to_testflight }}" = "true" ]; then
            ./scripts/release_ios_testflight.sh --upload
          else
            ./scripts/release_ios_testflight.sh
          fi

      - name: Upload iOS release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vocello-ios-testflight
          if-no-files-found: warn
          path: |
            build/VocelloiOS-TestFlight.xcarchive
            build/vocello_ios_testflight_export
            build/vocello_ios_testflight_release_metadata.txt
            build/foundation/ios-testflight-archive.xcresult

      - name: Publish deferred iPhone release summary
        if: always()
        run: |
          {
            echo "## Vocello iOS TestFlight"
            echo
            echo "- This workflow remains maintained for the deferred iPhone release track."
            echo "- It is not required for current macOS-first release signoff."
            echo "- Keep using it for explicit iPhone release hardening, owned-device validation follow-through, and future re-entry work."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clean up signing credentials
        if: always()
        run: |
          if [ -n "${QWENVOICE_SIGNING_KEYCHAIN:-}" ] && [ -f "$QWENVOICE_SIGNING_KEYCHAIN" ]; then
            security delete-keychain "$QWENVOICE_SIGNING_KEYCHAIN" >/dev/null 2>&1 || true
          fi
          rm -f "${APP_STORE_CONNECT_API_KEY_PATH:-}"
