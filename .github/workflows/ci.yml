name: CI

# Pre-merge CI for Vocello (QwenVoice).
#
# iOS: compile-only on GitHub-hosted runners against the device SDK. Real iOS UI acceptance runs
# through bundled Computer Use and iPhone Mirroring on a paired physical device.
#
# Ordinary CI is deterministic-only: project inputs, macOS Core/XPC/runtime/harness tests and
# builds, plus the iOS device-SDK compile check. Frontend impact is classified and reported for
# planning, but Computer Use evidence is required only by platform release workflows.
#
# Toolchain pinning mirrors release.yml: Xcode 26, XcodeGen + xcbeautify via Homebrew,
# SPM versions inherited from the committed Package.resolved.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      base_ref:
        description: 'Commit or checkpoint tag used for impact comparison'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-compile-check:
    name: iOS compile check (device SDK)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version
          swift --version

      - name: Install deterministic tooling
        run: |
          brew install xcodegen xcbeautify ripgrep
          xcodegen --version
          xcbeautify --version
          rg --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            build/ci/ios-compile-dd/SourcePackages
          key: spm-ios-compile-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-compile-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Build VocelloiOS for physical-device SDK
        run: |
          set -euo pipefail
          xcodebuild build \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/ci/ios-compile-dd \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

  macos-deterministic-tests:
    name: macOS deterministic tests + advisory UI impact
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi

      - name: Install deterministic tooling
        run: |
          brew install xcodegen xcbeautify ripgrep
          xcodegen --version
          xcbeautify --version
          rg --version

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Check project inputs
        run: ./scripts/check_project_inputs.sh

      - name: Run deterministic macOS tests
        run: scripts/macos_test.sh test

      - name: Build macOS app
        run: ./scripts/build.sh build

      - name: Report advisory frontend impact
        env:
          QVOICE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event_name == 'push' && github.event.before || inputs.base_ref }}
        run: |
          set -euo pipefail
          impact_dir="build/ci/frontend-impact"
          mkdir -p "$impact_dir"
          scripts/macos_agent_ui.sh impact > "$impact_dir/macos.json"
          scripts/ios_agent_ui.sh impact > "$impact_dir/ios.json"

          {
            echo "## Advisory frontend impact"
            echo
            echo "These reports help plan explicit frontend QA. They do not require Computer Use attestations for commits, pushes, pull requests, or ordinary merges."
            echo
            echo "### macOS"
            echo '```json'
            cat "$impact_dir/macos.json"
            echo '```'
            echo
            echo "### iOS"
            echo '```json'
            cat "$impact_dir/ios.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload advisory frontend impact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-impact-advisory
          path: build/ci/frontend-impact/
          if-no-files-found: error
          retention-days: 14

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-deterministic-test-artifacts
          path: build/macos/test-artifacts/
          if-no-files-found: warn
          retention-days: 14
