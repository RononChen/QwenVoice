name: CI

# Pre-merge CI for Vocello (QwenVoice).
#
# iOS: compile the app against the physical-device SDK. XCUITest is explicit local work and does
# not consume ordinary CI time.
#
# Ordinary CI remains UI-free: project inputs, macOS Core/XPC/runtime tests, and compile checks.
#
# Toolchain pinning mirrors release.yml: Xcode 26, XcodeGen + xcbeautify via Homebrew,
# SPM versions inherited from the committed Package.resolved.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-compile-check:
    name: iOS compile check (device SDK)
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Project-input validation verifies historical evidence commits.
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi
          xcodebuild -version
          swift --version

      - name: Install deterministic tooling
        run: |
          brew install xcodegen xcbeautify ripgrep
          xcodegen --version
          xcbeautify --version
          rg --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: build/cache/xcode/source-packages
          key: spm-ios-compile-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-compile-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Resolve SwiftPM dependencies
        run: |
          set -euo pipefail
          mkdir -p build/cache/xcode/source-packages build/scratch/derived-data/ci/ios-compile
          xcodebuild -resolvePackageDependencies \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -derivedDataPath build/scratch/derived-data/ci/ios-compile \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile

      - name: Compile VocelloiOS for the device SDK
        run: |
          set -euo pipefail
          xcodebuild build \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/scratch/derived-data/ci/ios-compile \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

  macos-deterministic-tests:
    name: macOS deterministic tests
    runs-on: macos-26
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          if [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app
          else
            sudo xcode-select -s /Applications/Xcode_26.0.app
          fi

      - name: Install deterministic tooling
        run: |
          brew install xcodegen xcbeautify ripgrep
          xcodegen --version
          xcbeautify --version
          rg --version

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Check project inputs
        run: ./scripts/check_project_inputs.sh

      - name: Run deterministic macOS tests
        run: scripts/macos_test.sh test

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-deterministic-test-artifacts
          path: build/artifacts/macos/tests/
          if-no-files-found: warn
          retention-days: 14
