name: Security

# Pull requests receive a dependency-diff review. CodeQL runs after changes land
# on main and on a weekly schedule so ordinary PR iteration does not acquire a
# second full Swift build.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 8 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        with:
          fail-on-severity: high

  swift-dependency-submission:
    name: Submit Swift dependency graph
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Generate deterministic Swift dependency snapshot
        run: |
          set -euo pipefail
          python3 scripts/swift_dependency_snapshot.py \
            --sha "$GITHUB_SHA" \
            --ref "$GITHUB_REF" \
            --job-id "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --job-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > "$RUNNER_TEMP/swift-dependency-snapshot.json"

      - name: Submit Swift dependency snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "repos/${GITHUB_REPOSITORY}/dependency-graph/snapshots" \
            --input "$RUNNER_TEMP/swift-dependency-snapshot.json"

  npm-advisory-audit:
    name: npm advisory audit (scheduled)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Select pinned Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Select pinned npm
        run: npm install --global npm@11.12.1

      - name: Audit locked website dependencies
        run: npm --prefix website audit --package-lock-only --audit-level=high

  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-26
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Select and validate native toolchain
        if: matrix.language == 'swift'
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          # CodeQL's tracing shell currently runs through Rosetta on the ARM
          # macos-26 image. Invoke the ARM Homebrew binary explicitly so its
          # architecture guard does not reject the otherwise native runner.
          arch -arm64 /opt/homebrew/bin/brew install xcodegen xcbeautify ripgrep shellcheck
          python3 scripts/supply_chain_contract.py --installed native

      - name: Build Swift targets for CodeQL
        if: matrix.language == 'swift'
        run: |
          # The CodeQL tracing shell is x86_64 even on the ARM macos-26
          # runner. Start the authoritative build through an ARM bash so
          # xcodebuild can select the repository's arm64-only destination.
          # build.sh owns regeneration; invoking it separately would run the
          # full project-input suite twice before compilation.
          arch -arm64 /bin/bash ./scripts/build.sh build

      - name: Analyze
        uses: github/codeql-action/analyze@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
