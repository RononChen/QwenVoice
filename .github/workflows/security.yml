name: Security

# Pull requests receive a dependency-diff review. CodeQL runs after changes land
# on main and on a weekly schedule so ordinary PR iteration does not acquire a
# second full Swift build.
on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '23 8 * * 2'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261 # v4.8.2
        with:
          fail-on-severity: high

  codeql:
    name: CodeQL (${{ matrix.language }})
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
            runner: ubuntu-latest
          - language: swift
            build-mode: manual
            runner: macos-26
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Select and validate native toolchain
        if: matrix.language == 'swift'
        run: |
          sudo xcode-select -s /Applications/Xcode_26.6.app
          brew install xcodegen xcbeautify ripgrep shellcheck
          python3 scripts/supply_chain_contract.py --installed native

      - name: Build Swift targets for CodeQL
        if: matrix.language == 'swift'
        run: |
          ./scripts/regenerate_project.sh
          ./scripts/build.sh build

      - name: Analyze
        uses: github/codeql-action/analyze@3599b3baa15b485a2e49ef411a7a4bb2452e7f93 # v3.30.5
