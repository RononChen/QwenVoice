name: Perf Nightly

# Nightly perf-lane bench against the committed Speed + Quality baselines.
# Advisory monitoring — not a per-PR or per-push gate. A red run means the
# engine's wall-clock / RTF / timing keys / boolean flags have drifted past
# the comparator's tolerance (±15 % wall, ±25 % per-key timing) on the
# current `main`.
#
# Variants are pinned via QWENVOICE_AUDIO_QC_REPEAT_VARIANT so the runner's
# RAM doesn't pick a different variant than the baseline tracks. GitHub
# macOS runners have more RAM than the 8 GB hardware floor — without
# pinning, the engine's hardware-recommendation policy would resolve
# `pro_custom` to Quality on the runner but Speed on the project owner's
# M2, breaking the comparison.

on:
  schedule:
    # 07:00 UTC daily (≈ 03:00 ET / 00:00 PT) — low-utilization window.
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      git_ref:
        description: 'Git ref (branch/tag/SHA) to bench. Defaults to main.'
        required: false
        default: main

permissions:
  contents: read

concurrency:
  # Don't cancel a perf bench in flight — the run takes ~10 minutes and
  # mid-bench cancellation produces no comparable manifest. Two nightly
  # runs colliding on the same ref is extremely unlikely (24-hour gap),
  # but workflow_dispatch could trigger overlaps if invoked rapidly.
  group: perf-nightly-${{ github.ref }}
  cancel-in-progress: false

env:
  CI_RESULT_ROOT: build/ci-results
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Redirect models out of `~/Library/Application Support/QwenVoice/...`
  # (path contains spaces) into a clean workspace-local directory so the
  # actions/cache action and shell quoting both behave predictably.
  QWENVOICE_AUDIO_QC_MODELS_ROOT: ${{ github.workspace }}/.qwenvoice-models

jobs:
  perf-nightly:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.git_ref || 'main' }}

      - name: Select Xcode
        run: |
          SELECTED_XCODE="$(python3 -c "from pathlib import Path; apps=sorted(Path('/Applications').glob('Xcode*.app')); preferred=Path('/Applications/Xcode.app'); stable=[app for app in apps if 'beta' not in app.name.lower()]; print(preferred if preferred.exists() else (stable[-1] if stable else (apps[-1] if apps else preferred)))")"
          sudo xcode-select -s "$SELECTED_XCODE"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Regenerate Xcode project
        run: ./scripts/regenerate_project.sh

      - name: Validate project inputs
        run: ./scripts/qa.sh validate

      - name: Cache SPM
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            build/foundation/source-packages
            build/harness/source-packages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}

      - name: Cache Hugging Face TTS models
        id: cache-models
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ${{ github.workspace }}/.qwenvoice-models
          # Bump the suffix when model sources/revisions change so the
          # cache invalidates cleanly. The model contract pins exact
          # Hugging Face commit revisions, so a contract bump should be
          # paired with a key bump.
          key: hf-customvoice-${{ runner.os }}-v1

      - name: Download CustomVoice models on cache miss
        if: steps.cache-models.outputs.cache-hit != 'true'
        run: |
          mkdir -p "$QWENVOICE_AUDIO_QC_MODELS_ROOT"
          python3 -m pip install --user --quiet huggingface_hub
          python3 - <<'PY'
          from huggingface_hub import snapshot_download
          import os, pathlib
          root = pathlib.Path(os.environ["QWENVOICE_AUDIO_QC_MODELS_ROOT"])
          variants = [
              ("Qwen3-TTS-12Hz-1.7B-CustomVoice-4bit",
               "mlx-community/Qwen3-TTS-12Hz-1.7B-CustomVoice-4bit"),
              ("Qwen3-TTS-12Hz-1.7B-CustomVoice-8bit",
               "mlx-community/Qwen3-TTS-12Hz-1.7B-CustomVoice-8bit"),
          ]
          for folder, slug in variants:
              snapshot_download(slug, local_dir=str(root / folder))
              print(f"snapshot ready: {folder}")
          PY

      - name: Perf bench — CustomVoice / Speed (4bit)
        env:
          QWENVOICE_AUDIO_QC_MODES: CustomVoice
          QWENVOICE_AUDIO_QC_REPEAT_VARIANT: speed
        run: ./scripts/qa.sh test --layer perf

      - name: Compare Speed bench vs Speed baseline
        run: ./scripts/compare_perf_manifest.sh

      - name: Archive Speed manifest before Quality overwrites it
        run: |
          mkdir -p build/audio-qc/qa-perf-archive
          cp build/audio-qc/qa-perf/generation-manifest.json \
             build/audio-qc/qa-perf-archive/speed-manifest.json

      - name: Perf bench — CustomVoice / Quality (8bit)
        env:
          QWENVOICE_AUDIO_QC_MODES: CustomVoice
          QWENVOICE_AUDIO_QC_REPEAT_VARIANT: quality
        run: ./scripts/qa.sh test --layer perf

      - name: Compare Quality bench vs Quality baseline
        run: ./scripts/compare_perf_manifest.sh
          --baseline scripts/perf-baseline-manifest-quality.json

      - name: Upload perf-nightly artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: perf-nightly-results
          path: |
            build/audio-qc/qa-perf-archive/speed-manifest.json
            build/audio-qc/qa-perf/generation-manifest.json
            build/audio-qc/qa-perf/generated
            build/harness/results/perf_audio_qc/test.xcresult
          if-no-files-found: warn
