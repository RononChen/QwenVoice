name: Apple Platform Build Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CI_RESULT_ROOT: build/ci-results
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Newer pushes to the same ref supersede older in-flight runs. A rapid
# sequence of commits to `main` (e.g. an agent-driven session) otherwise
# triggers one full run per commit with no cancellation. The release
# workflows serialize per-ref with cancel-in-progress: false because
# they ship build artifacts; this is a build gate, so it's safe (and
# cheaper) to cancel the older run.
concurrency:
  group: apple-platform-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-apple-platforms:
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Select Xcode
        run: |
          SELECTED_XCODE="$(python3 -c "from pathlib import Path; apps=sorted(Path('/Applications').glob('Xcode*.app')); preferred=Path('/Applications/Xcode.app'); stable=[app for app in apps if 'beta' not in app.name.lower()]; print(preferred if preferred.exists() else (stable[-1] if stable else (apps[-1] if apps else preferred)))")"
          sudo xcode-select -s "$SELECTED_XCODE"
          xcodebuild -version

      - name: Ensure XcodeGen
        run: command -v xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Cache Swift packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            build/foundation/source-packages
            build/harness/source-packages
          key: spm-${{ runner.os }}-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Regenerate project
        run: ./scripts/regenerate_project.sh

      - name: Prepare CI result roots
        run: |
          rm -rf "$CI_RESULT_ROOT"
          mkdir -p "$CI_RESULT_ROOT"

      - name: Validate checked-in project inputs
        run: ./scripts/qa.sh validate

      - name: Build macOS app
        run: |
          xcodebuild \
            -project QwenVoice.xcodeproj \
            -scheme QwenVoice \
            -destination 'platform=macOS' \
            -resultBundlePath "$CI_RESULT_ROOT/qwenvoice-macos-build.xcresult" \
            -resultBundleVersion 3 \
            build

      - name: Build iPhone app and extension
        run: |
          xcodebuild \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -destination 'generic/platform=iOS' \
            -resultBundlePath "$CI_RESULT_ROOT/vocello-ios-generic-build.xcresult" \
            -resultBundleVersion 3 \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build

      - name: Build and verify unsigned macOS release artifact
        run: |
          ./scripts/release.sh --output-name Vocello-macos26-ci
          ./scripts/verify_packaged_dmg.sh build/Vocello-macos26-ci.dmg build/release-metadata.txt

      - name: Publish build gate summary
        if: always()
        run: |
          {
            echo "## Apple Platform Build Gate"
            echo
            echo "- Project regeneration, qa.sh validate (static project-input check), generic macOS/iPhone compile proof, and unsigned macOS release verification ran here."
            echo "- App debugging, benchmarking, and behavioral test layers run locally on Mac mini M2; they are not gated by CI."
            echo "- The current public milestone remains macOS-first; iPhone distribution proof stays in the dedicated TestFlight workflow."
            echo "- Signed public release proof is owned by the dedicated Vocello macOS Release workflow."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload build result bundles
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: apple-platform-build-xcresults
          if-no-files-found: warn
          path: |
            build/ci-results
            build/foundation/*.xcresult

      - name: Upload release verification artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: apple-platform-release-proof
          if-no-files-found: warn
          path: |
            build/release-metadata.txt
            build/release-build-settings.log
            build/xcodebuild-release.log
