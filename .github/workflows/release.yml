name: Release

# Vocello release packaging. Signing and notarization start only after deterministic
# release-readiness checks pass. UI acceptance is an explicit XCUITest run outside hosted CI.
#
# Triggers:
#   - release.published: user clicks "Publish release" in the GitHub UI;
#     the workflow builds the DMG, uploads it as a workflow artifact, and
#     attaches it to the same Release that fired the event.
#   - workflow_dispatch:   manual fire from the Actions tab. Builds the
#     DMG, uploads as workflow artifact only. Useful for re-runs and dry
#     packaging without creating a Release.
#
# Jobs:
#   - package: macOS DMG production (signed + notarized + stapled), gated by current macOS
#     deterministic release checks.
#   - compile-ios: iOS compile-safety only. Runs in parallel with
#     `package` and does NOT block macOS publishing if it fails.
#   - archive-ios: optional manual signed archive / TestFlight lane. Physical-device XCUITest is an
#     independent explicit frontend-QA lane and is not required before dispatch.
#
# Toolchain pinning mirrors the local setup documented in .agents/release-qa-engineer.md:
#   - Xcode 26.0 (project.yml `xcodeVersion: "26.0"`)
#   - macOS 26.0 deployment target, Apple Silicon (`arch=arm64`)
#   - SPM versions inherited from Package.resolved (committed)
#   - XcodeGen + xcbeautify via Homebrew (no version pin in repo)
#   - Developer ID signing + Apple notarization (App Store Connect API
#     key flow — no Apple ID password footprint on CI)
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_DEV_ID_APP_P12_BASE64
#       The "Developer ID Application" certificate AND its private key,
#       exported from Keychain Access as a .p12, then base64-encoded.
#       One-liner from a Mac that has the key:
#         base64 -i DeveloperID.p12 | pbcopy
#
#   APPLE_DEV_ID_APP_P12_PASSWORD
#       The password used when exporting the .p12.
#
#   APPLE_NOTARY_KEY_ID
#       The 10-character key ID baked into the AuthKey_XXXXXX.p8 filename
#       (visible in https://appstoreconnect.apple.com/access/api).
#
#   APPLE_NOTARY_PRIVATE_KEY_P8
#       The full contents of the AuthKey_XXXXXX.p8 file (including the
#       -----BEGIN PRIVATE KEY----- header).
#
#   APPLE_NOTARY_ISSUER_ID
#       The App Store Connect "Issuer ID" UUID, visible as a header on
#       https://appstoreconnect.apple.com/access/api . NOT the same as
#       the Team ID.
#
#   APPLE_TEAM_ID
#       Ten-character Apple Developer Team ID (e.g. ABCDE12345). Used
#       for both codesign (--timestamp seal) and the team-ID match in
#       verify_release_bundle.sh.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      output_name:
        description: 'Override DMG basename (default: Vocello-macos26)'
        required: false
        type: string
      archive_ios:
        description: 'Also archive + export a signed iOS IPA (requires signing secrets)'
        required: false
        type: boolean
        default: false
      upload_to_testflight:
        description: 'After export, upload the IPA to TestFlight (requires ASC API key secrets)'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  package:
    name: Build + sign + notarize + DMG
    runs-on: macos-latest
    timeout-minutes: 150
    # contents:write is needed only when we attach the DMG to a GitHub
    # Release. Scoped to this job so a hypothetical forked-PR run can't
    # inherit write access at the workflow level.
    permissions:
      contents: write
    env:
      # Applied to every step in this job. Each step starts a fresh
      # process and would otherwise not see env vars set on a previous
      # step. release.sh and verify_packaged_dmg.sh each invoke
      # verify_release_bundle.sh internally — both need the launch-
      # smoke skip on a macOS-15 runner that can't launch a
      # macOS-26-targeted app.
      QWENVOICE_SIGNING_MODE: developer-id
      QWENVOICE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
      QWENVOICE_NOTARIZE: "1"
      QWENVOICE_SKIP_LAUNCH_SMOKE: "1"
      # Tighten the bundle-verify gate now that the DMG is properly
      # signed + notarized — verify_release_bundle.sh and
      # verify_packaged_dmg.sh both honor these.
      QWENVOICE_EXPECT_SIGNED_RELEASE: "1"
      QWENVOICE_EXPECT_NOTARIZED_DMG: "1"
      QWENVOICE_EXPECT_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # notarytool reads these env vars via release.sh (--key, --key-id,
      # --issuer). The .p8 file itself is written to disk by the "Write
      # API key file" step; this var is exported from that step.
      APPLE_API_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Deep checkout so `git rev-parse HEAD` in scripts/release.sh
          # resolves a real commit SHA for release-metadata.txt.
          fetch-depth: 0

      - name: Select Xcode 26.0
        # The xcode-select path is the actual toolchain pin. macos-latest
        # ships several Xcode versions side-by-side under /Applications/;
        # if Xcode_26.0.app isn't pre-installed, this step fails fast with
        # a clear error and we switch to a more specific runner image.
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: |
          brew install xcodegen xcbeautify
          xcodegen --version
          xcbeautify --version

      - name: Setup signing keychain
        # Decode the Developer ID certificate, import it into a fresh
        # temporary keychain, prepend that keychain to the user search
        # list so `codesign` finds the identity, and extract the
        # signing-identity common name back out into $GITHUB_ENV so
        # release.sh's --signing-identity arg (read from
        # QWENVOICE_SIGNING_IDENTITY) is populated without a separate
        # secret. The keychain file is deleted in the "Cleanup signing
        # material" step, success or failure.
        env:
          CERT_BASE64: ${{ secrets.APPLE_DEV_ID_APP_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.APPLE_DEV_ID_APP_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/vocello-signing.keychain-db"
          # Ephemeral keychain password — only used during this job;
          # never logged, never persisted, never echoed.
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$CERT_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/cert.p12" \
            -P "$CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/cert.p12"

          # Prepend the new keychain to the user search list (preserving
          # the originals — the login keychain stays available so brew
          # etc. keep working).
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null

          # Surface available identities for log evidence + extract the
          # Developer ID Application signing-identity CN. The CN is what
          # codesign --sign expects.
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          [ -n "$IDENTITY" ] || { echo "::error::No 'Developer ID Application' identity found in the imported cert" >&2; exit 1; }
          echo "Resolved signing identity: $IDENTITY"

          # Export to subsequent steps without surfacing the value in
          # the workflow UI's "env" panel.
          echo "QWENVOICE_CODESIGN_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "QWENVOICE_SIGNING_IDENTITY=$IDENTITY"        >> "$GITHUB_ENV"

      - name: Write App Store Connect API key file
        # notarytool's --key flag expects a path to the .p8 file, not
        # the contents. Decode the secret to a 0600 file under
        # $RUNNER_TEMP and export its path. Deleted by Cleanup step.
        env:
          NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY_P8 }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$NOTARY_KEY_P8" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          # Sanity-check: a valid PKCS#8 EC key begins with this header.
          head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY" \
            || { echo "::error::APPLE_NOTARY_PRIVATE_KEY_P8 does not look like a PKCS#8 private key (first line is not 'BEGIN PRIVATE KEY')" >&2; exit 1; }
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: build/cache/xcode/source-packages
          key: spm-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode26-

      - name: Run scripts/release.sh (Developer ID + notarized DMG)
        # QWENVOICE_SIGNING_MODE / SIGNING_IDENTITY / DEVELOPMENT_TEAM /
        # NOTARIZE / SKIP_LAUNCH_SMOKE / EXPECT_SIGNED_RELEASE /
        # EXPECT_NOTARIZED_DMG / CODESIGN_KEYCHAIN come from job-level env
        # plus the two previous steps' $GITHUB_ENV exports.
        # APPLE_API_KEY_PATH + APPLE_API_KEY_ID + APPLE_API_ISSUER_ID
        # are consumed by `xcrun notarytool submit --wait` inside
        # release.sh. Wall-clock ~30-45 min (build + sign + notarize);
        # timeout-minutes is 90 to absorb Apple notarization queue spikes.
        run: |
          if [ -n "${{ inputs.output_name }}" ]; then
            ./scripts/release.sh --preflight none --output-name "${{ inputs.output_name }}"
          else
            ./scripts/release.sh --preflight none
          fi

      - name: Resolve produced artifact paths
        id: artifacts
        run: |
          # release.sh owns distribution outputs under build/dist/macos.
          output_name="${{ inputs.output_name }}"
          [ -z "$output_name" ] && output_name="Vocello-macos26"
          dmg="build/dist/macos/${output_name}.dmg"
          metadata="build/dist/macos/release-metadata.txt"
          [ -f "$dmg" ] || { echo "missing: $dmg" >&2; ls -la build/dist/macos/ >&2; exit 1; }
          [ -f "$metadata" ] || { echo "missing: $metadata" >&2; exit 1; }
          echo "dmg=$dmg" >> "$GITHUB_OUTPUT"
          echo "metadata=$metadata" >> "$GITHUB_OUTPUT"
          echo "output_name=$output_name" >> "$GITHUB_OUTPUT"

      - name: Verify packaged DMG (signed + notarized)
        # With QWENVOICE_EXPECT_SIGNED_RELEASE=1 + EXPECT_NOTARIZED_DMG=1
        # this also checks `xcrun stapler validate` and the codesign
        # team-id seals — see scripts/verify_packaged_dmg.sh and
        # verify_release_bundle.sh for the per-flag behaviour.
        run: ./scripts/verify_packaged_dmg.sh "${{ steps.artifacts.outputs.dmg }}" "${{ steps.artifacts.outputs.metadata }}"

      - name: Surface release metadata in log
        run: |
          echo "=== release-metadata.txt ==="
          cat "${{ steps.artifacts.outputs.metadata }}"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifacts.outputs.output_name }}-dmg
          path: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.metadata }}
          if-no-files-found: error
          retention-days: 30

      - name: Attach DMG to the GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.artifacts.outputs.dmg }}
            ${{ steps.artifacts.outputs.metadata }}
          fail_on_unmatched_files: true

      - name: Cleanup signing material
        # Always run, even on prior-step failure, so the signing
        # keychain + private key are not left on the runner image.
        # (The runner is ephemeral, but matches macOS-CI best practice.)
        if: always()
        run: |
          if [ -n "${QWENVOICE_CODESIGN_KEYCHAIN:-}" ] && [ -f "$QWENVOICE_CODESIGN_KEYCHAIN" ]; then
            security delete-keychain "$QWENVOICE_CODESIGN_KEYCHAIN" || true
          fi
          if [ -n "${APPLE_API_KEY_PATH:-}" ] && [ -f "$APPLE_API_KEY_PATH" ]; then
            rm -f "$APPLE_API_KEY_PATH"
          fi

  compile-ios:
    # iOS compile-safety check. Runs in parallel with the macOS package
    # job and is intentionally NOT a `needs:` dependency — if iOS source
    # regresses, the macOS DMG still ships.
    #
    # This CI job does NOT produce a TestFlight-ready IPA. The separate, implemented
    # `archive-ios` job owns signed archive/export on explicit manual dispatch. The
    # com.apple.developer.kernel.increased-memory-limit capability is
    # SELF-SERVE (no Apple approval) and is enabled on com.patricedery.vocello
    # (the engine runs in-process — there is no separate extension App ID);
    # local on-device build/test tooling is established (scripts/ios_device.sh plus
    # IOSDeviceDiagnosticsRunner; optional physical-device XCUITest is documented in
    # docs/reference/ios-device-testing.md). Dispatching the signed lane still needs:
    #   1. iOS Distribution certificate enrolled in the Apple Developer team.
    #   2. A Distribution provisioning profile for the com.patricedery.vocello
    #      app bundle that includes the increased-memory-limit entitlement.
    # The sibling `archive-ios` job below imports those credentials, exports the IPA, and
    # uploads it as a workflow artifact.
    name: iOS compile-safety
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Project-input validation verifies historical evidence commits.
          fetch-depth: 0

      - name: Select Xcode 26.0
        run: |
          sudo xcode-select -s /Applications/Xcode_26.0.app
          xcodebuild -version
          swift --version

      - name: Install XcodeGen + xcbeautify
        run: |
          brew install xcodegen xcbeautify
          xcodegen --version
          xcbeautify --version

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: build/cache/xcode/source-packages
          key: spm-ios-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        # project.yml is authoritative; regeneration refreshes and verifies the
        # checked-in generated .xcodeproj before the compile step. This mirrors
        # the setup performed by the macOS job inside release.sh.
        run: ./scripts/regenerate_project.sh

      - name: Compile iOS targets (no code signing)
        # CODE_SIGNING_ALLOWED=NO inside the script. Compile products are
        # scratch state; the failure result bundle is a bounded artifact.
        # Purely a "does this still compile" gate.
        run: ./scripts/build_foundation_targets.sh ios

      - name: Upload iOS xcresult bundle on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ios-compile-xcresult
          path: build/artifacts/foundation/vocello-ios-generic-build.xcresult
          if-no-files-found: warn
          retention-days: 14

  archive-ios:
    # Signed iOS archive + App Store export lane. The job is implemented; account credentials,
    # App Store Connect metadata, and public submission remain maintainer-owned.
    #
    # GATING: only runs on a MANUAL workflow_dispatch with archive_ios=true. It is
    # never triggered by `release: published`, so a missing-secrets state can never
    # break the macOS DMG release. Fire it from the Actions tab once signing is set up.
    #
    # REQUIRED secrets (maintainer adds these in repo Settings → Secrets):
    #   IOS_DIST_CERT_P12        base64 of the iOS Distribution .p12
    #   IOS_DIST_CERT_PASSWORD   the .p12 export password
    #   IOS_PROVISION_PROFILE    base64 of the App Store .mobileprovision (MUST carry the
    #                            com.apple.developer.kernel.increased-memory-limit capability)
    #   QWENVOICE_DEVELOPMENT_TEAM   the 10-char Apple team id
    #   ASC_API_KEY_ID / ASC_API_ISSUER_ID / ASC_API_KEY_P8   App Store Connect API key
    #                            (key id, issuer id, base64 of the .p8) — for -allowProvisioningUpdates
    #                            and the optional TestFlight upload.
    # Full runbook: docs/reference/ios-appstore-submission.md
    name: iOS archive + App Store export
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.archive_ios }}
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Project-input validation verifies historical evidence commits.
          fetch-depth: 0

      - name: Select Xcode 26.0
        run: sudo xcode-select -s /Applications/Xcode_26.0.app

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Cache SwiftPM dependencies
        uses: actions/cache@v4
        with:
          path: build/cache/xcode/source-packages
          key: spm-ios-archive-${{ runner.os }}-xcode26-${{ hashFiles('QwenVoice.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-ios-archive-${{ runner.os }}-xcode26-

      - name: Regenerate Xcode project
        env:
          QWENVOICE_DEVELOPMENT_TEAM: ${{ secrets.QWENVOICE_DEVELOPMENT_TEAM }}
        run: ./scripts/regenerate_project.sh

      - name: Resolve SwiftPM dependencies
        run: |
          set -euo pipefail
          mkdir -p build/cache/xcode/source-packages build/scratch/derived-data/ci/ios-archive build/dist/ios
          xcodebuild -resolvePackageDependencies \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -derivedDataPath build/scratch/derived-data/ci/ios-archive \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile

      - name: Import signing assets
        env:
          IOS_DIST_CERT_P12: ${{ secrets.IOS_DIST_CERT_P12 }}
          IOS_DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
          IOS_PROVISION_PROFILE: ${{ secrets.IOS_PROVISION_PROFILE }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/vocello-signing.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          echo "$IOS_DIST_CERT_P12" | base64 --decode > "$RUNNER_TEMP/dist.p12"
          security import "$RUNNER_TEMP/dist.p12" -k "$KEYCHAIN" -P "$IOS_DIST_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISION_PROFILE" | base64 --decode > "$RUNNER_TEMP/profile.mobileprovision"
          UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin <<< "$(security cms -D -i "$RUNNER_TEMP/profile.mobileprovision")")
          cp "$RUNNER_TEMP/profile.mobileprovision" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

          # App Store Connect API key for -allowProvisioningUpdates (xcodebuild reads it
          # by explicit path) + the optional altool TestFlight upload (which discovers it
          # in ~/.appstoreconnect/private_keys).
          mkdir -p "$RUNNER_TEMP/asc" ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_P8" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey_${ASC_API_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/asc/AuthKey_${ASC_API_KEY_ID}.p8"
          cp "$RUNNER_TEMP/asc/AuthKey_${ASC_API_KEY_ID}.p8" ~/.appstoreconnect/private_keys/
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Inject team id into ExportOptions
        env:
          QWENVOICE_DEVELOPMENT_TEAM: ${{ secrets.QWENVOICE_DEVELOPMENT_TEAM }}
        run: |
          set -euo pipefail
          /usr/libexec/PlistBuddy -c "Add :teamID string $QWENVOICE_DEVELOPMENT_TEAM" ExportOptions-appstore.plist || \
          /usr/libexec/PlistBuddy -c "Set :teamID $QWENVOICE_DEVELOPMENT_TEAM" ExportOptions-appstore.plist

      - name: Archive VocelloiOS
        env:
          QWENVOICE_DEVELOPMENT_TEAM: ${{ secrets.QWENVOICE_DEVELOPMENT_TEAM }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          # Release entitlements drop get-task-allow, which App Store Connect rejects.
          QVOICE_IOS_APP_ENTITLEMENTS: Sources/iOS/VocelloiOSRelease.entitlements
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project QwenVoice.xcodeproj \
            -scheme VocelloiOS \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/scratch/derived-data/ci/ios-archive \
            -clonedSourcePackagesDirPath build/cache/xcode/source-packages \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            -archivePath build/dist/ios/Vocello.xcarchive \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            -allowProvisioningUpdates \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            DEVELOPMENT_TEAM="$QWENVOICE_DEVELOPMENT_TEAM" \
            QVOICE_IOS_APP_ENTITLEMENTS="$QVOICE_IOS_APP_ENTITLEMENTS" | xcbeautify

      - name: Verify archive entitlement + bundled catalog
        # The bundled iOS model catalog must match the contract, and the archived
        # app MUST carry increased-memory-limit (or the model load is Jetsam-killed).
        # The full metadata-driven scripts/verify_ios_release_archive.sh (which also
        # checks on-device-validation provenance) is a local maintainer step — see
        # docs/reference/ios-appstore-submission.md.
        run: |
          set -euo pipefail
          ./scripts/check_ios_catalog.sh
          APP=$(find build/dist/ios/Vocello.xcarchive/Products/Applications -maxdepth 1 -name '*.app' -type d | head -1)
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -q "com.apple.developer.kernel.increased-memory-limit" \
            && echo "increased-memory-limit entitlement present" \
            || { echo "::error::archived app missing increased-memory-limit entitlement"; exit 1; }
          if codesign -d --entitlements :- "$APP" 2>/dev/null | grep -q "com.apple.security.get-task-allow"; then
            echo "::error::archived app still carries get-task-allow; use VocelloiOSRelease.entitlements for archive"
            exit 1
          else
            echo "get-task-allow absent — release entitlements look correct"
          fi

      - name: Export App Store IPA
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath build/dist/ios/Vocello.xcarchive \
            -exportOptionsPlist ExportOptions-appstore.plist \
            -exportPath build/dist/ios/export \
            -authenticationKeyPath "$RUNNER_TEMP/asc/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            -allowProvisioningUpdates | xcbeautify

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vocello-ios-ipa
          path: build/dist/ios/export/*.ipa
          if-no-files-found: error
          retention-days: 14

      - name: Upload to TestFlight
        if: ${{ inputs.upload_to_testflight }}
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          set -euo pipefail
          IPA=$(ls build/dist/ios/export/*.ipa | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_API_KEY_ID" --apiIssuer "$ASC_API_ISSUER_ID"
