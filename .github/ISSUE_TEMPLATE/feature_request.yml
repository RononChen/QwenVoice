name: Feature request
description: Propose a focused product or developer-workflow improvement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Voice generation runtime
        - macOS application
        - iPhone application
        - vocello CLI
        - Model delivery
        - Testing or benchmarks
        - Website or documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: Describe the user or maintainer outcome, not only a preferred implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: tradeoffs
    attributes:
      label: Constraints and tradeoffs
      description: Include privacy, memory, offline/local behavior, compatibility, or evidence implications.
