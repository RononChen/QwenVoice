name: QwenVoice
options:
  bundleIdPrefix: com.qwenvoice
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.10.0"
  MLXAudio:
    path: third_party_patches/mlx-audio-swift
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift.git
    exactVersion: "0.30.6"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface.git
    exactVersion: "0.9.0"

schemes:
  QwenVoice:
    build:
      targets:
        QwenVoice: all
    run:
      config: Debug
    archive:
      config: Release

  VocelloiOS:
    build:
      targets:
        VocelloiOS: all
    run:
      config: Debug
    archive:
      config: Release

targets:
  QwenVoice:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "QwenVoiceCore"
          - "QwenVoiceCore/**"
          - "QwenVoiceBackendCore"
          - "QwenVoiceBackendCore/**"
          - "QwenVoiceEngineService"
          - "QwenVoiceEngineService/**"
          - "QwenVoiceEngineSupport"
          - "QwenVoiceEngineSupport/**"
          - "iOS"
          - "iOS/**"
          - "iOSEngineExtension"
          - "iOSEngineExtension/**"
          - "iOSSupport"
          - "iOSSupport/**"
          - "QwenVoiceNative"
          - "QwenVoiceNative/**"
          - "Resources/ffmpeg"
          - "Resources/ffmpeg/**"
          - "Resources/vendor"
          - "Resources/vendor/**"
          - "Resources/**/*.whl"
          - "Resources/**/__pycache__/**"
          - "Resources/**/*.pyc"
    resources:
      - path: Sources/Resources
        buildPhase: resources
        excludes:
          - "ffmpeg"
          - "vendor"
          - "vendor/**"
          - "**/*.whl"
          - "**/__pycache__/**"
          - "**/*.pyc"
      - path: Sources/Assets.xcassets
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.app
        PRODUCT_NAME: Vocello
        WRAPPER_NAME: Vocello.app
        # Keep the Swift module name as QwenVoice so sibling modules that assume
        # the QwenVoice namespace still resolve after the on-disk rename to Vocello.app.
        PRODUCT_MODULE_NAME: QwenVoice
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "16"
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: Sources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Vocello
        INFOPLIST_KEY_QwenVoiceTeamIdentifier: $(QWENVOICE_DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: Sources/QwenVoice.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG QW_UI_LIQUID"
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LIQUID
    dependencies:
      - package: GRDB
      - target: QwenVoiceCore
      - target: QwenVoiceEngineService
      - target: QwenVoiceEngineSupport
      - target: QwenVoiceNative
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace
  QwenVoiceNative:
    type: framework.static
    platform: macOS
    sources:
      - path: Sources/QwenVoiceNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.native
        PRODUCT_NAME: QwenVoiceNative
        PRODUCT_MODULE_NAME: QwenVoiceNative
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: QwenVoiceCore
      - target: QwenVoiceEngineSupport
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceEngineSupport:
    type: framework.static
    platform: macOS
    sources:
      - path: Sources/QwenVoiceEngineSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.engine-support
        PRODUCT_NAME: QwenVoiceEngineSupport
        PRODUCT_MODULE_NAME: QwenVoiceEngineSupport
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: QwenVoiceCore
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceCore:
    type: framework.static
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/QwenVoiceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qvoice.core
        PRODUCT_NAME: QwenVoiceCore
        PRODUCT_MODULE_NAME: QwenVoiceCore
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: Sources/QwenVoiceCore/QwenVoiceCore-Bridging-Header.h
    dependencies:
      - target: QwenVoiceBackendCore
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceBackendCore:
    type: framework.static
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/QwenVoiceBackendCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qvoice.backend-core
        PRODUCT_NAME: QwenVoiceBackendCore
        PRODUCT_MODULE_NAME: QwenVoiceBackendCore
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX

  QwenVoiceEngineService:
    type: xpc-service
    platform: macOS
    sources:
      - path: Sources/QwenVoiceEngineService
      - path: Sources/Resources/qwenvoice_contract.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.app.engine-service
        PRODUCT_NAME: QwenVoiceEngineService
        PRODUCT_MODULE_NAME: QwenVoiceEngineService
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: Sources/QwenVoiceEngineService/Info.plist
        INFOPLIST_KEY_QwenVoiceTeamIdentifier: $(QWENVOICE_DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: Sources/QwenVoice.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: QwenVoiceCore
      - target: QwenVoiceEngineSupport
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  VocelloEngineExtension:
    type: extensionkit-extension
    platform: iOS
    sources:
      - path: Sources/iOSEngineExtension
      - path: Sources/Resources/qwenvoice_contract.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patricedery.vocello.engine-extension
        PRODUCT_NAME: VocelloEngineExtension
        PRODUCT_MODULE_NAME: VocelloEngineExtension
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "16"
        SWIFT_VERSION: "6"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/iOSEngineExtension/Info.plist
        QVOICE_IOS_APP_GROUP_IDENTIFIER: group.com.patricedery.vocello.shared
        QVOICE_IOS_EXTENSION_ENTITLEMENTS: Sources/iOSEngineExtension/VocelloEngineExtension.entitlements
        CODE_SIGN_ENTITLEMENTS: $(QVOICE_IOS_EXTENSION_ENTITLEMENTS)
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(QWENVOICE_DEVELOPMENT_TEAM)
    dependencies:
      - target: QwenVoiceCore
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  VocelloiOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/iOS
      - path: Sources/iOSSupport
      - path: Sources/SharedSupport
      - path: Sources/Resources/qwenvoice_contract.json
        buildPhase: resources
      - path: Sources/Resources/qwenvoice_ios_model_catalog.json
        buildPhase: resources
      - path: Sources/Resources/voice-previews
        buildPhase: resources
        # Per-voice ~2.5 s preview WAVs (24 kHz mono Int16). Each file
        # is named after the speaker id from qwenvoice_contract.json
        # (aiden.wav / ryan.wav / vivian.wav / serena.wav). The voice
        # picker sheet plays them via IOSVoicePreviewPlayer when the
        # row's preview button is tapped. WAV bytes are generated by
        # running the macOS Vocello.app once per speaker — see
        # `Sources/iOS/Sheets/IOSVoicePreviewPlayer.swift` for the
        # bundle lookup convention.
      - path: Sources/Assets.xcassets
        buildPhase: resources
    resources:
      - path: Sources/iOS/LaunchScreen.storyboard
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patricedery.vocello
        PRODUCT_NAME: Vocello
        PRODUCT_MODULE_NAME: QVoiceiOS
        EXECUTABLE_NAME: Vocello
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(QWENVOICE_DEVELOPMENT_TEAM)
        QVOICE_IOS_APP_GROUP_IDENTIFIER: group.com.patricedery.vocello.shared
        QVOICE_IOS_APP_ENTITLEMENTS: Sources/iOS/VocelloiOS.entitlements
        QVOICE_IOS_DEFAULT_MODEL_CATALOG_URL: "bundle://vocello/ios/catalog/v1/models.json"
        INFOPLIST_KEY_QVoiceModelCatalogURL: $(QVOICE_IOS_DEFAULT_MODEL_CATALOG_URL)
        INFOPLIST_KEY_QVoiceSharedAppGroupIdentifier: $(QVOICE_IOS_APP_GROUP_IDENTIFIER)
        INFOPLIST_KEY_CFBundleDisplayName: Vocello
        EX_ENABLE_EXTENSION_POINT_GENERATION: YES
        MARKETING_VERSION: "2.0.0"
        CURRENT_PROJECT_VERSION: "16"
        SWIFT_VERSION: "6"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: $(QVOICE_IOS_APP_ENTITLEMENTS)
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        ASSETCATALOG_COMPILER_APPICON_NAME: VocelloIOSIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: GRDB
      - target: QwenVoiceCore
      - target: VocelloEngineExtension
        embed: true
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace
