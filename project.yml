name: QwenVoice
options:
  bundleIdPrefix: com.qwenvoice
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

# Single shippable config. There is no separate Debug config / DEBUG symbol —
# debug capabilities are gated at runtime via DebugMode (env QWENVOICE_DEBUG or
# the hidden version-tap toggle). scripts/build.sh builds this config -Onone for
# a fast local loop; scripts/release.sh builds it optimized for the DMG.
configs:
  Release: release

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "7.10.0"
  MLXAudio:
    path: third_party_patches/mlx-audio-swift
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift.git
    exactVersion: "0.30.6"
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface.git
    exactVersion: "0.9.0"

schemes:
  QwenVoice:
    build:
      targets:
        QwenVoice: all
        VocelloMacUITests: [test]
    run:
      config: Release
    test:
      config: Release
      targets:
        - VocelloMacUITests
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release

  VocelloiOS:
    build:
      targets:
        VocelloiOS: all
        VocelloiOSUITests: [test]
    run:
      config: Release
    test:
      config: Release
      targets:
        - VocelloiOSUITests
    profile:
      config: Release
    analyze:
      config: Release
    archive:
      config: Release

targets:
  QwenVoice:
    type: application
    platform: macOS
    sources:
      - path: Sources
        excludes:
          - "QwenVoiceCore"
          - "QwenVoiceCore/**"
          - "QwenVoiceBackendCore"
          - "QwenVoiceBackendCore/**"
          - "QwenVoiceEngineService"
          - "QwenVoiceEngineService/**"
          - "QwenVoiceEngineSupport"
          - "QwenVoiceEngineSupport/**"
          - "iOS"
          - "iOS/**"
          - "iOSSupport"
          - "iOSSupport/**"
          - "QwenVoiceNative"
          - "QwenVoiceNative/**"
          - "VocelloCLI"
          - "VocelloCLI/**"
          - "Resources/ffmpeg"
          - "Resources/ffmpeg/**"
          - "Resources/vendor"
          - "Resources/vendor/**"
          - "Resources/**/*.whl"
          - "Resources/**/__pycache__/**"
          - "Resources/**/*.pyc"
    resources:
      - path: Sources/Resources
        buildPhase: resources
        excludes:
          - "ffmpeg"
          - "vendor"
          - "vendor/**"
          - "**/*.whl"
          - "**/__pycache__/**"
          - "**/*.pyc"
      - path: Sources/Assets.xcassets
        buildPhase: resources
      - path: Sources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.app
        PRODUCT_NAME: Vocello
        WRAPPER_NAME: Vocello.app
        # Keep the Swift module name as QwenVoice so sibling modules that assume
        # the QwenVoice namespace still resolve after the on-disk rename to Vocello.app.
        PRODUCT_MODULE_NAME: QwenVoice
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "18"
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: Sources/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: Vocello
        INFOPLIST_KEY_QwenVoiceTeamIdentifier: $(QWENVOICE_DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: Sources/QwenVoice.entitlements
        CODE_SIGN_IDENTITY: "-"
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
      configs:
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: QW_UI_LIQUID
    dependencies:
      - package: GRDB
      - target: QwenVoiceCore
      - target: QwenVoiceEngineService
      - target: QwenVoiceEngineSupport
      - target: QwenVoiceNative
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  # Headless Swift CLI over the in-process engine (QwenVoiceCore). User-facing
  # generation without the UI + the deterministic driver for benchmarks/perf
  # tests (replaces computer-use UI-driving). No Python backend, no bundled
  # weights — links the same engine frameworks as the app/XPC service.
  VocelloCLI:
    type: tool
    platform: macOS
    sources:
      - path: Sources/VocelloCLI
      # Bundle the contract beside the binary so the CLI resolves it via the
      # Bundle sweep in CLIRuntime.locateManifestURL — no longer dependent on
      # being run from the repo root. Uses the explicit resources buildPhase
      # (same shape as the iOS target / XcodeGen 2.45.4 gotcha) to be safe for
      # a non-app `tool` product.
      - path: Sources/Resources/qwenvoice_contract.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.cli
        PRODUCT_NAME: vocello
        PRODUCT_MODULE_NAME: VocelloCLI
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        # Ad-hoc signed, no hardened runtime: a plain CLI runs Metal/MLX fine
        # without the app's allow-unsigned-memory entitlement.
        CODE_SIGN_IDENTITY: "-"
    dependencies:
      - target: QwenVoiceCore
      - target: QwenVoiceEngineSupport
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceNative:
    type: framework.static
    platform: macOS
    sources:
      - path: Sources/QwenVoiceNative
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.native
        PRODUCT_NAME: QwenVoiceNative
        PRODUCT_MODULE_NAME: QwenVoiceNative
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: QwenVoiceCore
      - target: QwenVoiceEngineSupport
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceEngineSupport:
    type: framework.static
    platform: macOS
    sources:
      - path: Sources/QwenVoiceEngineSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.engine-support
        PRODUCT_NAME: QwenVoiceEngineSupport
        PRODUCT_MODULE_NAME: QwenVoiceEngineSupport
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: QwenVoiceCore
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceCore:
    type: framework.static
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/QwenVoiceCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.core
        PRODUCT_NAME: QwenVoiceCore
        PRODUCT_MODULE_NAME: QwenVoiceCore
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_OBJC_BRIDGING_HEADER: Sources/QwenVoiceCore/QwenVoiceCore-Bridging-Header.h
    dependencies:
      - target: QwenVoiceBackendCore
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      # Deterministic-sampling seed (GenerationRequest.seed → MLXRandom.seed
      # in prepareGeneration). Product link only — the MLXSwift pin is untouched.
      - package: MLXSwift
        product: MLXRandom
      - package: SwiftHuggingFace
        product: HuggingFace

  QwenVoiceBackendCore:
    type: framework.static
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Sources/QwenVoiceBackendCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.backend-core
        PRODUCT_NAME: QwenVoiceBackendCore
        PRODUCT_MODULE_NAME: QwenVoiceBackendCore
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX

  QwenVoiceEngineService:
    type: xpc-service
    platform: macOS
    sources:
      - path: Sources/QwenVoiceEngineService
      - path: Sources/Resources/qwenvoice_contract.json
        buildPhase: resources
      - path: Sources/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.app.engine-service
        PRODUCT_NAME: QwenVoiceEngineService
        PRODUCT_MODULE_NAME: QwenVoiceEngineService
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        INFOPLIST_FILE: Sources/QwenVoiceEngineService/Info.plist
        INFOPLIST_KEY_QwenVoiceTeamIdentifier: $(QWENVOICE_DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: Sources/QwenVoice.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - target: QwenVoiceCore
      - target: QwenVoiceEngineSupport
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  VocelloiOS:
    type: application
    platform: iOS
    # XcodeGen 2.45.4 gotcha (see AGENTS.md "XcodeGen iOS-resource gotcha" + commit
    # 287c969): the bundled resources below MUST be listed under `sources:` with an
    # explicit `buildPhase: resources` override. Listing them under `resources:`
    # silently drops them from the VocelloiOS Resources phase, so iOS builds compile
    # but crash on first launch with missing bundled resources. Do not "tidy" these
    # into the `resources:` block.
    sources:
      - path: Sources/iOS
      - path: Sources/iOSSupport
      - path: Sources/SharedSupport
      - path: Sources/Resources/qwenvoice_contract.json
        buildPhase: resources
      - path: Sources/Resources/qwenvoice_ios_model_catalog.json
        buildPhase: resources
      - path: Sources/Resources/voice-previews
        buildPhase: resources
        # Per-voice preview WAVs (24 kHz mono Int16). Each file
        # is named after the speaker id from qwenvoice_contract.json. The voice
        # picker sheet plays them via IOSVoicePreviewPlayer when the
        # row's preview button is tapped. WAV bytes are generated by
        # running the macOS Vocello.app once per speaker — see
        # `Sources/iOS/Sheets/IOSVoicePreviewPlayer.swift` for the
        # bundle lookup convention.
      - path: Sources/Assets.xcassets
        buildPhase: resources
      - path: Sources/PrivacyInfo.xcprivacy
        buildPhase: resources
    resources:
      - path: Sources/iOS/LaunchScreen.storyboard
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patricedery.vocello
        PRODUCT_NAME: Vocello
        PRODUCT_MODULE_NAME: QVoiceiOS
        EXECUTABLE_NAME: Vocello
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(QWENVOICE_DEVELOPMENT_TEAM)
        QVOICE_IOS_APP_GROUP_IDENTIFIER: group.com.patricedery.vocello.shared
        QVOICE_IOS_APP_ENTITLEMENTS: Sources/iOS/VocelloiOS.entitlements
        QVOICE_IOS_DEFAULT_MODEL_CATALOG_URL: "bundle://vocello/ios/catalog/v1/models.json"
        INFOPLIST_KEY_QVoiceModelCatalogURL: $(QVOICE_IOS_DEFAULT_MODEL_CATALOG_URL)
        INFOPLIST_KEY_QVoiceSharedAppGroupIdentifier: $(QVOICE_IOS_APP_GROUP_IDENTIFIER)
        INFOPLIST_KEY_CFBundleDisplayName: Vocello
        MARKETING_VERSION: "2.1.0"
        CURRENT_PROJECT_VERSION: "18"
        SWIFT_VERSION: "6"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: $(QVOICE_IOS_APP_ENTITLEMENTS)
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        ASSETCATALOG_COMPILER_APPICON_NAME: VocelloIOSIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: GRDB
      - target: QwenVoiceCore
      - package: MLXAudio
        product: MLXAudioCore
      - package: MLXAudio
        product: MLXAudioTTS
      - package: MLXSwift
        product: MLX
      - package: SwiftHuggingFace
        product: HuggingFace

  # Thin XCUITest UI-flow smoke (host = VocelloiOS). Asserts launch + the 4-tab IA +
  # the Studio composer/mode-control via the stable accessibilityIdentifiers. The
  # durable replacement (with scripts/ios_device.sh) for the deprecated screen-mirror
  # macOS UI smoke — the standing pre-release gate (docs/reference/macos-release-qa.md).
  # Run: xcodebuild test -scheme QwenVoice -destination 'platform=macOS,arch=arm64'
  VocelloMacUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/VocelloMacUITests
    dependencies:
      - target: QwenVoice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qwenvoice.app.uitests
        PRODUCT_NAME: VocelloMacUITests
        PRODUCT_MODULE_NAME: VocelloMacUITests
        TEST_TARGET_NAME: QwenVoice
        SWIFT_VERSION: "6"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"
        GENERATE_INFOPLIST_FILE: YES

  # UI driving — see docs/reference/ios-device-testing.md. Runs on device or simulator
  # via: xcodebuild test -scheme VocelloiOS -destination 'id=<UDID>' (or a sim).
  VocelloiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/VocelloiOSUITests
    dependencies:
      - target: VocelloiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.patricedery.vocello.uitests
        PRODUCT_NAME: VocelloiOSUITests
        PRODUCT_MODULE_NAME: VocelloiOSUITests
        TEST_TARGET_NAME: VocelloiOS
        SWIFT_VERSION: "6"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(QWENVOICE_DEVELOPMENT_TEAM)
        GENERATE_INFOPLIST_FILE: YES
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
        # UI tests are inherently main-thread bound and touch Objective-C XCTest/XCUIAutomation
        # APIs that are annotated @MainActor. Use minimal concurrency checking so the test code
        # can stay focused on flows instead of actor isolation boilerplate.
        SWIFT_STRICT_CONCURRENCY: minimal
