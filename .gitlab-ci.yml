# Vocello (QwenVoice) — GitLab CI/CD (primary). GitHub Actions workflows are legacy reference only.
# See docs/reference/gitlab-ci.md and docs/reference/testing-runbook.md.

stages:
  - test
  - release
  - deploy

default:
  interruptible: true

variables:
  GIT_DEPTH: "0"
  GITLAB_PROJECT_URL: "https://gitlab.com/VocelloApp/QwenVoice"
  GITHUB_MIRROR_URL: "https://github.com/PowerBeef/QwenVoice"

# --- iOS Tier-A fake-backend UI (Simulator) — mirrors .github/workflows/ci.yml ---

.ios_tier_a_before:
  before_script:
    - sudo xcode-select -s /Applications/Xcode_26.0.app
    - xcodebuild -version
    - swift --version
    - brew install xcodegen xcbeautify
    - ./scripts/regenerate_project.sh

ios-tier-a-ui:
  stage: test
  tags: [saas-macos-medium-m1]
  timeout: 45m
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
  extends: .ios_tier_a_before
  cache:
    key: spm-ios-sim-xcode26-$CI_COMMIT_REF_SLUG
    paths:
      - build/foundation/local-builds/ios-sim-tierA-dd/SourcePackages
    policy: pull-push
  script:
    - |
      set -euo pipefail
      UDID=$(xcrun simctl list devices available | awk -F'[()]' '/iPhone/ { udid=$2 } END { print udid }')
      [ -n "$UDID" ] || { echo "no available iPhone simulator"; xcrun simctl list devices available; exit 1; }
      echo "Using simulator $UDID"
      xcodebuild test \
        -project QwenVoice.xcodeproj \
        -scheme VocelloiOS \
        -configuration Release \
        -destination "id=$UDID" \
        -derivedDataPath build/foundation/local-builds/ios-sim-tierA-dd \
        -resultBundlePath build/ci/ios-tier-a.xcresult \
        -only-testing:VocelloiOSUITests/VocelloiOSSmokeUITests \
        -only-testing:VocelloiOSUITests/VocelloiOSSheetUITests \
        -only-testing:VocelloiOSUITests/VocelloiOSFakeGenerationUITests \
        -only-testing:VocelloiOSUITests/VocelloiOSFakeGenerationErrorUITests \
        CODE_SIGNING_ALLOWED=NO | xcbeautify
  artifacts:
    when: on_failure
    expire_in: 14 days
    paths:
      - build/ci/ios-tier-a.xcresult

# --- Release: macOS DMG (manual on version tag) — mirrors release.yml package job ---

.package_env:
  variables:
    QWENVOICE_SIGNING_MODE: developer-id
    QWENVOICE_DEVELOPMENT_TEAM: $APPLE_TEAM_ID
    QWENVOICE_NOTARIZE: "1"
    QWENVOICE_SKIP_LAUNCH_SMOKE: "1"
    QWENVOICE_EXPECT_SIGNED_RELEASE: "1"
    QWENVOICE_EXPECT_NOTARIZED_DMG: "1"
    QWENVOICE_EXPECT_TEAM_ID: $APPLE_TEAM_ID

package:
  stage: release
  tags: [saas-macos-medium-m1]
  timeout: 90m
  extends: .package_env
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]/
      when: manual
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
  before_script:
    - sudo xcode-select -s /Applications/Xcode_26.0.app
    - brew install xcodegen xcbeautify
    - source scripts/ci/gitlab_setup_signing.sh
  script:
    - |
      set -euo pipefail
      if [ -n "${RELEASE_OUTPUT_NAME:-}" ]; then
        ./scripts/release.sh --preflight none --output-name "$RELEASE_OUTPUT_NAME"
      else
        ./scripts/release.sh --preflight none
      fi
    - |
      OUTPUT_NAME="${RELEASE_OUTPUT_NAME:-Vocello-macos26}"
      DMG="build/${OUTPUT_NAME}.dmg"
      METADATA="build/release-metadata.txt"
      [ -f "$DMG" ] && [ -f "$METADATA" ] || { ls -la build/; exit 1; }
      ./scripts/verify_packaged_dmg.sh "$DMG" "$METADATA"
      cat "$METADATA"
  artifacts:
    expire_in: 30 days
    paths:
      - build/*.dmg
      - build/release-metadata.txt
  after_script:
    - |
      if [ -n "${QWENVOICE_CODESIGN_KEYCHAIN:-}" ] && [ -f "$QWENVOICE_CODESIGN_KEYCHAIN" ]; then
        security delete-keychain "$QWENVOICE_CODESIGN_KEYCHAIN" || true
      fi
      if [ -n "${APPLE_API_KEY_PATH:-}" ] && [ -f "$APPLE_API_KEY_PATH" ]; then
        rm -f "$APPLE_API_KEY_PATH"
      fi

compile-ios:
  stage: release
  tags: [saas-macos-medium-m1]
  timeout: 30m
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]/
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - sudo xcode-select -s /Applications/Xcode_26.0.app
    - brew install xcodegen xcbeautify
    - ./scripts/regenerate_project.sh
  script:
    - ./scripts/build_foundation_targets.sh ios
  allow_failure: true
  artifacts:
    when: on_failure
    expire_in: 14 days
    paths:
      - build/foundation/local-builds/vocello-ios-generic-build.xcresult

release-publish:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [package]
  rules:
    - if: $CI_COMMIT_TAG =~ /^v[0-9]/
  script:
    - |
      OUTPUT_NAME="${RELEASE_OUTPUT_NAME:-Vocello-macos26}"
      release-cli create \
        --name "Release $CI_COMMIT_TAG" \
        --tag-name "$CI_COMMIT_TAG" \
        --description "Vocello macOS release $CI_COMMIT_TAG. See docs/releases/${CI_COMMIT_TAG}.md in the repo." \
        --assets-path build/

# --- GitHub one-way mirror (optional; requires GITHUB_MIRROR_TOKEN) ---

mirror_to_github:
  stage: deploy
  image: alpine/git:latest
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  script:
    - apk add --no-cache bash
    - |
      if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
        echo "GITHUB_MIRROR_TOKEN not set; skipping GitHub mirror."
        exit 0
      fi
      bash scripts/ci/gitlab_mirror_to_github.sh
